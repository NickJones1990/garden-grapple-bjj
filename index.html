<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Garden Grapple — Position Map</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><circle cx='16' cy='16' r='14' fill='%231a3a3a'/><text x='16' y='22' text-anchor='middle' font-size='18' fill='%238B9E7E'>🪷</text></svg>">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#f7f6f3;--bg2:#eeeee9;--bg3:#fff;--text:#1a1a1a;--text2:#555;--text3:#999;--border:#ddd;--brand1:#1a3a3a;--brand2:#2d5252;--brand3:#8B9E7E;--brand4:#e8ede4;--red:#C4454A;--radius:10px;--radius-sm:6px;--star:#BA7517}
@media(prefers-color-scheme:dark){:root{--bg:#1a1a1a;--bg2:#252525;--bg3:#2a2a2a;--text:#e5e5e5;--text2:#aaa;--text3:#666;--border:#333}}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);max-width:820px;margin:0 auto;padding:12px;line-height:1.5;-webkit-font-smoothing:antialiased}
button{font-family:inherit;cursor:pointer;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-sm);padding:4px 10px;font-size:12px;color:var(--text2);transition:all .15s}
button:hover{border-color:#aaa;color:var(--text)}button:active{transform:scale(.97)}
input,select{font-family:inherit;font-size:14px;padding:8px 10px;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--bg3);color:var(--text);width:100%}
input:focus,select:focus{outline:none;border-color:var(--brand3)}select{width:auto}
.login-wrap{display:flex;align-items:center;justify-content:center;min-height:80vh}
.login-box{width:100%;max-width:360px;text-align:center}
.login-box h2{font-size:16px;font-weight:500;margin:16px 0 12px;color:var(--text)}
.login-box .sub{font-size:12px;color:var(--text3);margin-bottom:16px}
.user-list{display:flex;flex-direction:column;gap:6px;margin-bottom:16px}
.user-btn{padding:12px 16px;text-align:left;font-size:14px;font-weight:500;border-radius:var(--radius);border:1px solid var(--border);background:var(--bg3);cursor:pointer;display:flex;align-items:center;gap:10px}
.user-btn:hover{border-color:var(--brand3)}
.user-avatar{width:36px;height:36px;border-radius:50%;background:var(--brand1);color:var(--brand3);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:500;flex-shrink:0}
.user-info{flex:1}.user-info .name{color:var(--text)}.user-info .meta{font-size:11px;color:var(--text3);font-weight:400}
.pin-input{display:flex;gap:8px;justify-content:center;margin:12px 0}
.pin-digit{width:48px;height:56px;text-align:center;font-size:24px;font-weight:500;letter-spacing:2px;border-radius:var(--radius);border:2px solid var(--border);background:var(--bg3)}
.pin-digit:focus{border-color:var(--brand3)}
.pin-error{color:var(--red);font-size:12px;margin-top:4px}
.header{display:flex;align-items:center;gap:12px;padding:14px 16px;background:linear-gradient(135deg,#1a3a3a,#2d5252);border-radius:var(--radius);margin-bottom:12px;flex-wrap:wrap}
.header svg{flex-shrink:0}.header-text{flex:1;min-width:120px}
.header h1{font-size:17px;font-weight:600;color:#e8ede4;letter-spacing:.08em;line-height:1.2}
.header .sub{font-size:10px;color:#8B9E7E;letter-spacing:.12em;margin-top:2px}
.header-right{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.ctx-btns{display:flex;gap:4px}
.ctx-btn{border:none;padding:5px 12px;border-radius:var(--radius-sm);font-size:11px;font-weight:500;background:rgba(255,255,255,.06);color:#8B9E7E;cursor:pointer}
.ctx-btn.active-all{background:rgba(255,255,255,.15);color:#e8ede4}
.ctx-btn.active-gi{background:#8B9E7E;color:#1a3a3a}
.ctx-btn.active-nogi{background:#5a8a8a;color:#1a3a3a}
.user-pill{border:none;padding:4px 10px;border-radius:var(--radius-sm);font-size:11px;background:rgba(255,255,255,.1);color:#8B9E7E;cursor:pointer;display:flex;align-items:center;gap:4px}
.toolbar{display:flex;align-items:center;gap:6px;margin-bottom:10px;flex-wrap:wrap}
.breadcrumb{font-size:12px;color:var(--text3);display:flex;align-items:center;gap:4px}
.breadcrumb span.link{color:var(--text2);cursor:pointer}.breadcrumb span.link:hover{color:var(--text)}
.breadcrumb span.current{color:var(--text);font-weight:500}
.spacer{flex:1}
.group-card{text-align:left;padding:14px 16px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);cursor:pointer;width:100%;margin-bottom:8px;border-left:4px solid #888}
.group-card h3{font-weight:500;font-size:15px;margin-bottom:2px}.group-card .meta{font-size:12px;color:var(--text3)}
.pos-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:8px;margin-bottom:12px}
.pos-card{text-align:left;padding:12px 14px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);cursor:pointer;border-left:3px solid #888}
.pos-card h4{font-weight:500;font-size:14px;margin-bottom:4px}.pos-card .meta{font-size:12px;color:var(--text3)}
.pos-card .tags{display:flex;gap:4px;margin-top:6px;flex-wrap:wrap}
.tag{font-size:10px;padding:1px 6px;border-radius:var(--radius-sm)}
.cat-section{margin-bottom:20px}
.cat-header{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.cat-icon{width:22px;height:22px;border-radius:var(--radius-sm);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:500}
.cat-title{font-size:14px;font-weight:500}.cat-count{font-size:12px;color:var(--text3)}
.item{display:flex;align-items:flex-start;gap:8px;padding:8px 12px;border-radius:var(--radius-sm);border:1px solid var(--border);border-left:3px solid #888;background:var(--bg3);margin-bottom:4px}
.item-body{flex:1;min-width:0}
.item-row{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.item-name{font-weight:500;font-size:14px}.item-notes{font-size:13px;color:var(--text2);margin-top:2px}
.item-actions{display:flex;gap:4px;flex-shrink:0;align-items:center}
.star-btn{border:none;background:none;font-size:18px;padding:0 2px;cursor:pointer;line-height:1;color:var(--text3);transition:color .15s}
.star-btn.active{color:var(--star)}
.priority-tag,.ctx-tag,.dest-tag,.dest-finish{font-size:10px;padding:1px 6px;border-radius:var(--radius-sm);font-weight:500}
.dest-tag{cursor:pointer}
.filter-bar{display:flex;gap:4px;margin-bottom:12px;align-items:center;flex-wrap:wrap}
.filter-btn{font-size:12px;opacity:.5}.filter-btn.active{opacity:1;font-weight:500}
.mygame-btn{font-size:12px;padding:3px 10px;border-radius:var(--radius-sm)}
.mygame-btn.active{background:var(--brand1);color:var(--brand4);border-color:var(--brand1)}
.form-box{padding:12px;border-radius:var(--radius-sm);background:var(--bg2);margin-top:8px}
.form-row{display:flex;gap:8px;margin-bottom:8px;flex-wrap:wrap}
.form-actions{display:flex;gap:6px}
.empty{font-size:13px;color:var(--text3);padding:4px 0;font-style:italic}
.del-btn{color:var(--red);border-color:transparent;background:transparent}.del-btn:hover{color:#a00}
.add-cats{margin-top:8px;font-size:12px;color:var(--text3)}
.admin-bar{background:var(--bg2);padding:8px 12px;border-radius:var(--radius-sm);margin-bottom:10px;font-size:12px;display:flex;align-items:center;gap:8px;color:var(--text2);flex-wrap:wrap}
.admin-bar .badge{background:var(--brand1);color:var(--brand4);padding:2px 8px;border-radius:var(--radius-sm);font-size:10px;font-weight:500}
@media(max-width:500px){.header{padding:12px}.header h1{font-size:15px}.pos-grid{grid-template-columns:1fr}.pin-digit{width:42px;height:48px;font-size:20px}}
.search-wrap{position:relative;margin-bottom:10px}
.search-input{font-size:13px;padding:7px 32px 7px 10px}
.search-clear{position:absolute;right:8px;top:50%;transform:translateY(-50%);background:none;border:none;font-size:17px;color:var(--text3);cursor:pointer;padding:0;line-height:1}
.search-result-item{padding:9px 12px;background:var(--bg3);border:1px solid var(--border);border-left:3px solid #888;border-radius:var(--radius-sm);margin-bottom:4px;cursor:pointer}
.search-result-item:hover{border-color:var(--brand3)}
.search-result-pos{font-size:11px;color:var(--text3);margin-bottom:2px}
.search-result-name{font-size:14px;font-weight:500}
.video-link{font-size:10px;padding:1px 6px;border-radius:var(--radius-sm);background:var(--bg2);color:var(--brand2);text-decoration:none;border:1px solid var(--border);white-space:nowrap}
.video-link:hover{border-color:var(--brand3);color:var(--brand1)}
.tap-btn{border:1px solid transparent;background:none;font-size:11px;padding:2px 6px;cursor:pointer;color:var(--text3);border-radius:var(--radius-sm)}
.tap-btn:hover{background:var(--bg2);border-color:var(--border)}
.tap-btn.tapped{color:var(--brand2);font-weight:600;border-color:var(--brand3)}
.note-btn{border:none;background:none;font-size:13px;padding:1px 4px;cursor:pointer;color:var(--text3);line-height:1}
.note-btn.has-note{color:var(--brand2)}
.user-note-wrap{margin-top:6px}
.user-note-ta{width:100%;font-size:12px;padding:5px 7px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--bg2);color:var(--text);resize:vertical;min-height:48px;font-family:inherit;line-height:1.4}
.user-note-ta:focus{outline:none;border-color:var(--brand3)}
.session-section{margin-top:14px;padding-top:14px;border-top:1px solid var(--border)}
.session-item{display:flex;align-items:center;gap:8px;padding:5px 0;font-size:12px;border-bottom:1px solid var(--bg2);cursor:pointer}
.session-item:hover .session-name{color:var(--brand2)}
.session-name{flex:1;font-weight:500}
.session-pos{color:var(--text3);font-size:11px}
.session-count{background:var(--brand1);color:var(--brand4);font-size:10px;font-weight:600;padding:1px 6px;border-radius:var(--radius-sm);flex-shrink:0}
.home-tabs{display:flex;gap:4px;margin-bottom:12px;background:var(--bg2);padding:4px;border-radius:var(--radius)}
.home-tab{flex:1;padding:8px;font-size:12px;font-weight:500;border:none;border-radius:var(--radius-sm);background:transparent;color:var(--text3);cursor:pointer;text-align:center;transition:all .15s}
.home-tab.active{background:var(--bg3);color:var(--text);box-shadow:0 1px 3px rgba(0,0,0,.1)}
.series-card{text-align:left;padding:14px 16px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);cursor:pointer;width:100%;margin-bottom:8px;border-left:4px solid #888}
.series-card h3{font-weight:500;font-size:15px;margin-bottom:3px}
.series-card .meta{font-size:12px;color:var(--text3)}
.series-step{display:flex;gap:10px;padding:10px 12px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-sm);margin-bottom:6px;border-left:3px solid #888}
.step-num{width:22px;height:22px;border-radius:50%;background:var(--brand1);color:var(--brand4);font-size:11px;font-weight:600;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}
.step-body{flex:1}
.step-name{font-weight:500;font-size:14px;margin-bottom:3px}
.step-notes{font-size:13px;color:var(--text2);line-height:1.5}
.belt-card{text-align:left;padding:16px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);cursor:pointer;width:100%;margin-bottom:8px;border-left:4px solid #888;display:flex;flex-direction:column;gap:10px}
.belt-card:hover{border-color:var(--brand3)}
.belt-card-visual{display:flex;align-items:center;justify-content:space-between;gap:8px}
.belt-card-side{display:flex;flex-direction:column;align-items:center;gap:5px;flex:1}
.belt-card-label{font-size:13px;font-weight:600;color:var(--text)}
.belt-card-arrow{font-size:22px;color:var(--text3);flex-shrink:0;font-weight:300}
.belt-card-body{flex:1}
.belt-card-title{font-weight:500;font-size:15px;margin-bottom:2px}
.belt-card-desc{font-size:12px;color:var(--text3)}
.belt-item{padding:10px 12px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-sm);margin-bottom:5px;border-left:3px solid #888}
.belt-item-header{display:flex;align-items:center;gap:8px;margin-bottom:3px}
.belt-item-name{font-weight:500;font-size:14px}
.belt-cat-tag{font-size:10px;padding:1px 6px;border-radius:var(--radius-sm);background:var(--bg2);color:var(--text3)}
.belt-item-notes{font-size:13px;color:var(--text2);line-height:1.5}
.belt-group-header{font-size:12px;font-weight:600;color:var(--text3);letter-spacing:.06em;text-transform:uppercase;margin:14px 0 6px;padding-left:2px}
</style>
</head>

<script>
const DEFAULT_DATA={"groups":[{"id":"standing","name":"Standing","color":"#B4B2A9","positions":[{"id":"standing-neutral","name":"Standing (neutral)","actions":{"takedowns":[{"name":"Double leg","notes":"Level change, penetration step, drive through","priority":1,"leadsTo":"top-side-control","ctx":"both","id":"standing-neutral_takedowns_double-leg"},{"name":"Single leg","notes":"Outside step, head inside, run the pipe","priority":1,"leadsTo":"top-half-guard","ctx":"both","id":"standing-neutral_takedowns_single-leg"},{"name":"Arm drag \u2192 back take","notes":"2-on-1, drag past, seatbelt","priority":1,"leadsTo":"back-attacking","ctx":"both","id":"standing-neutral_takedowns_arm-drag-to-back-take"},{"name":"Collar drag","notes":"Snap and circle behind using collar grip","priority":2,"leadsTo":"back-attacking","ctx":"gi","id":"standing-neutral_takedowns_collar-drag"},{"name":"Foot sweep","notes":"Timing-based off-balance, deashi barai","priority":3,"leadsTo":"top-side-control","ctx":"both","id":"standing-neutral_takedowns_foot-sweep"},{"name":"Body lock takedown","notes":"Clinch, outside trip or lift","priority":2,"leadsTo":"top-side-control","ctx":"both","id":"standing-neutral_takedowns_body-lock-takedown"}],"submissions":[{"name":"Standing guillotine","notes":"Snap down, lock chin, sit to guard","priority":2,"leadsTo":"finish","ctx":"both","id":"standing-neutral_submissions_standing-guillotine"}],"transitions":[{"name":"Pull closed guard","notes":"Collar + sleeve, sit and close","priority":2,"leadsTo":"bottom-closed-guard","ctx":"gi","id":"standing-neutral_transitions_pull-closed-guard"},{"name":"Pull closed guard","notes":"2-on-1 or bodylock, sit and close","priority":2,"leadsTo":"bottom-closed-guard","ctx":"nogi","id":"standing-neutral_transitions_pull-closed-guard_nogi"},{"name":"Sit to butterfly","notes":"Underhook, sit to butterfly hooks","priority":2,"leadsTo":"bottom-butterfly","ctx":"both","id":"standing-neutral_transitions_sit-to-butterfly"},{"name":"Imanari roll","notes":"Duck under, roll into ashi on lead leg","priority":3,"leadsTo":"bottom-ashi-garami","ctx":"nogi","id":"standing-neutral_transitions_imanari-roll"},{"name":"Sprawl \u2192 front headlock","notes":"Defend shot, snap down","priority":1,"leadsTo":"top-front-headlock","ctx":"both","id":"standing-neutral_transitions_sprawl-to-front-headlock"}],"risks":[{"name":"Takedown","notes":"They shoot \u2014 sprawl, crossface, circle","priority":1,"leadsTo":"bottom-side-control","ctx":"both","id":"standing-neutral_risks_takedown"},{"name":"Snap down","notes":"Front headlock \u2014 posture up immediately","priority":2,"leadsTo":"bottom-turtle","ctx":"both","id":"standing-neutral_risks_snap-down"},{"name":"Throw","notes":"Judo \u2014 don't overcommit on grips","priority":2,"leadsTo":"bottom-side-control","ctx":"gi","id":"standing-neutral_risks_throw"},{"name":"Imanari roll","notes":"They roll into your legs \u2014 sprawl or step back","priority":2,"leadsTo":"bottom-ashi-garami","ctx":"nogi","id":"standing-neutral_risks_imanari-roll"}]}}]},{"id":"top","name":"Top position","color":"#7F77DD","positions":[{"id":"top-closed-guard","name":"Closed guard (top)","actions":{"passes":[{"name":"Stand up pass","notes":"Grip control, stand, break guard, toreando or knee cut","priority":1,"leadsTo":"top-side-control","ctx":"both","id":"top-closed-guard_passes_stand-up-pass"},{"name":"Log splitter","notes":"Hands in collar, knee in tailbone, split legs","priority":2,"leadsTo":"top-half-guard","ctx":"gi","id":"top-closed-guard_passes_log-splitter"},{"name":"Double under pass","notes":"Stack, walk around \u2014 heavy on hips","priority":2,"leadsTo":"top-side-control","ctx":"both","id":"top-closed-guard_passes_double-under-pass"},{"name":"Knee in the middle","notes":"Posture up, wedge knee, break open","priority":1,"leadsTo":"top-open-guard","ctx":"both","id":"top-closed-guard_passes_knee-in-the-middle"}],"submissions":[{"name":"Ezekiel choke","notes":"Sleeve grip, fist to throat from ins // --- Data layer ---
async function loadAll(){
  try{
    const [masterData,usersData,adminPin,seriesData,beltData]=await Promise.all([fbGet("master"),fbGet("users"),fbGet("adminPin"),fbGet("series"),fbGet("beltProgress")]);
    data=masterData||JSON.parse(JSON.stringify(DEFAULT_DATA));
    users=usersData||[];
    series=seriesData||JSON.parse(JSON.stringify(DEFAULT_SERIES));
    beltProgress=beltData||JSON.parse(JSON.stringify(DEFAULT_BELT));
    if(!adminPin)await fbSet("adminPin","0000");
    if(!masterData)await fbSet("master",data);
    if(!seriesData)await fbSet("series",series);
    if(!beltData)await fbSet("beltProgress",beltProgress);
    const cu=localStorage.getItem(CUR_USER_KEY);
    if(cu){curUser=users.find(u=>(u.email||"").toLowerCase()===cu.toLowerCase())||null;if(curUser)filterCtx=curUser.filterCtx||"all"}
    fbReady=true;fbError="";
  }catch(e){
    fbError="Could not connect to database: "+e.message;fbReady=false;
  }
  render();
}

async function refreshData(){
  if(!fbReady)return;
  try{
    const [masterData,usersData,seriesData,beltData]=await Promise.all([fbGet("master"),fbGet("users"),fbGet("series"),fbGet("beltProgress")]);
    if(masterData)data=masterData;
    if(seriesData)series=seriesData;
    if(beltData)beltProgress=beltData;
    if(usersData){
      users=usersData;
      if(curUser&&!isAdmin){const cu=localStorage.getItem(CUR_USER_KEY);curUser=users.find(u=>(u.email||"").toLowerCase()===cu?.toLowerCase())||null}
    }
    render();
  }catch{}
}

function genTechId(posId,cat,name){const slug=name.toLowerCase().replace(/\s+/g,"-").replace(/[^a-z0-9-]/g,"").slice(0,30);return posId+"_"+cat+"_"+slug+"_"+Date.now().toString(36)}
function isMyGame(techId){return!!(curUser&&!isAdmin&&curUser.myGame&&curUser.myGame[techId])}
async function toggleMyGame(techId){if(!curUser||isAdmin)return;if(!curUser.myGame)curUser.myGame={};if(curUser.myGame[techId])delete curUser.myGame[techId];else curUser.myGame[techId]=true;await saveUsers();render()}

function posMap(){const m={};if(!data)return m;data.groups.forEach(g=>g.positions.forEach(p=>{m[p.id]=p.name}));return m}
function ctxMatch(item){return filterCtx==="all"||(item.ctx||"both")==="both"||(item.ctx||"both")===filterCtx}
function h(tag,props,...kids){const el=document.createElement(tag);if(props)Object.entries(props).forEach(([k,v])=>{if(k==="style"&&typeof v==="object")Object.assign(el.style,v);else if(k.startsWith("on"))el.addEventListener(k.slice(2).toLowerCase(),v);else if(k==="class")el.className=v;else el.setAttribute(k,v)});kids.flat(9).forEach(c=>{if(c!=null&&c!==false)el.append(typeof c==="string"||typeof c==="number"?document.createTextNode(c):c)});return el}
function initials(name){return name.split(/\s+/).map(w=>w[0]).join("").toUpperCase().slice(0,2)}
function dlJSON(obj,filename){const b=new Blob([JSON.stringify(obj,null,2)],{type:"application/json"});const a=document.createElement("a");a.href=URL.createObjectURL(b);a.download=filename;a.click();URL.revokeObjectURL(a.href)}
function readJSON(cb){const fi=document.createElement("input");fi.type="file";fi.accept=".json";fi.onchange=e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>{try{cb(JSON.parse(ev.target.result))}catch{alert("Invalid JSON file")}};r.readAsText(f)};fi.click()}
function countTech(){let n=0;data.groups.forEach(g=>g.positions.forEach(p=>Object.values(p.actions).forEach(a=>n+=a.length)));return n}

function searchTechs(q){if(!q||q.length<2)return[];const lq=q.toLowerCase();const results=[];const pm=posMap();data.groups.forEach(g=>{g.positions.forEach(p=>{CATS.forEach(cat=>{(p.actions[cat]||[]).forEach(item=>{if(!ctxMatch(item))return;if(item.name.toLowerCase().includes(lq)||(item.notes||"").toLowerCase().includes(lq)||p.name.toLowerCase().includes(lq)){results.push({item,posId:p.id,posName:p.name,cat,groupId:g.id,groupColor:g.color})}})})})});return results.slice(0,50)}

inp.addEventListener("input",()=>{
  searchQ=inp.value;
  clearTimeout(searchTimer);
  searchTimer=setTimeout(()=>{
    render();
    const si=document.querySelector(".search-input");
    if(si){si.focus();const l=si.value.length;si.setSelectionRange(l,l)}
  },180);
});
wrap.append(inp);

  const clr=h("button",{class:"search-clear",onClick:()=>{searchQ="";render()}},"×");

function renderSearchResults(pm){
const results=searchTechs(searchQ);
const wrap=h("div",null);
if(!results.length){wrap.append(h("div",{class:"empty"},"No results for: "+searchQ));return wrap}
wrap.append(h("div",{style:{fontSize:"12px",color:"var(--text3)",marginBottom:"8px"}},results.length+" result"+(results.length===1?"":"s")));
const todayTaps=getTodayTaps();
results.forEach(({item,posId,posName,cat,groupId,groupColor})=>{
  const m=CATMETA[cat];
  const starred=isMyGame(item.id);
  const tapCount=todayTaps[item.id]||0;
  const myNote=getUserNote(item.id);
  const card=h("div",{class:"search-result-item",style:{borderLeftColor:groupColor}});
  card.append(h("div",{class:"search-result-pos"},posName+" · "+m.l));
  const row=h("div",{style:{display:"flex",alignItems:"center",gap:"6px",flexWrap:"wrap"}});
  row.append(h("span",{class:"search-result-name"},item.name));
  row.append(h("span",{class:"priority-tag",style:{background:item.priority===1?m.bg:"var(--bg2)",color:item.priority===1?m.t:"var(--text3)"}},PRIO[item.priority]));
  if(item.url)row.append(h("a",{class:"video-link",href:item.url,target:"_blank",onClick:e=>e.stopPropagation()},"▶ Watch"));
  const actions=h("div",{style:{display:"flex",gap:"4px",marginLeft:"auto",alignSelf:"flex-start"}});
  if(!isAdmin&&curUser)actions.append(h("button",{class:"tap-btn"+(tapCount?" tapped":""),onClick:e=>{e.stopPropagation();tapTech(item.id)}},"+"+(tapCount||1)+(tapCount?" ×"+tapCount:"")));
  if(!isAdmin&&curUser)actions.append(h("button",{class:"star-btn"+(starred?" active":""),onClick:e=>{e.stopPropagation();toggleMyGame(item.id)}},starred?"★":"☆"));
  row.append(actions);
  card.append(row);
  if(item.notes)card.append(h("div",{class:"item-notes",style:{marginTop:"3px"}},item.notes));
  if(myNote&&expandNoteId!==item.id)card.append(h("div",{class:"user-note-display",style:{fontSize:"11px",color:"var(--brand2)",marginTop:"4px",fontStyle:"italic"}},'"'+myNote+'"'));
  if(!isAdmin&&curUser){
    if(expandNoteId===item.id){
      const ta=h("textarea",{class:"user-note-ta",placeholder:"My notes on this technique…"});
      ta.value=myNote;
      ta.addEventListener("click",e=>e.stopPropagation());
      ta.addEventListener("blur",async()=>{await saveUserNote(item.id,ta.value)});
      card.append(h("div",{class:"user-note-wrap"},ta));
      setTimeout(()=>ta.focus(),0);
    }
    card.querySelector(".search-result-name")&&null;
  }
  card.addEventListener("click",()=>{
    if(expandNoteId===item.id){expandNoteId=null;return}
    path=[groupId,posId];editing=null;adding=null;filterP=null;searchQ="";render();
  });
  wrap.append(card);
});
return wrap;
}

// --- Render ---
function render(){
const app=document.getElementById("app");app.innerHTML="";
if(!fbReady){
  if(fbError)app.append(h("div",{style:{padding:"3rem",textAlign:"center"}},renderLogoSVG(48),h("h2",{style:{margin:"16px 0 8px",fontSize:"16px",fontWeight:"500"}},"GARDEN GRAPPLE"),h("div",{class:"pin-error",style:{marginTop:"12px"}},fbError),h("button",{style:{marginTop:"12px"},onClick:()=>loadAll()},"Retry")));
  else app.append(h("div",{style:{padding:"3rem",textAlign:"center",color:"var(--text3)"}},"Connecting to database..."));
  return;
}
if(!curUser){app.append(renderLogin());return}
const pm=posMap();
app.append(renderHeader());
if(isAdmin)app.append(renderAdminBar());
const pp=renderProfilePanel();if(pp)app.append(pp);
// Home tabs only visible at top level
if(path.length===0&&!seriesPath&&!beltPath){
  app.append(renderSearchBar());
  if(searchQ.length>=2){app.append(renderSearchResults(pm));return}
  app.append(renderHomeTabs());
  if(homeTab==="positional")app.append(renderGroups());
  else if(homeTab==="series")app.append(renderSeriesList());
  else if(homeTab==="belt")app.append(renderBeltList());
  return;
}
app.append(renderToolbar(pm));
app.append(renderSearchBar());
if(searchQ.length>=2){app.append(renderSearchResults(pm));return}
// Series detail
if(seriesPath){const s=series.find(x=>x.id===seriesPath);if(s)app.append(renderSeriesDetail(s));return}
// Belt detail
if(beltPath){const b=beltProgress.find(x=>x.id===beltPath);if(b)app.append(renderBeltDetail(b));return}
// Positional views
if(path.length===1){const g=data.groups.find(x=>x.id===path[0]);if(g)app.append(renderPositions(g,pm))}
else if(path.length===2){const g=data.groups.find(x=>x.id===path[0]);const p=g?.positions.find(x=>x.id===path[1]);if(p)app.append(renderDetail(p,pm))}
}

function makePinInputs(){
const wrap=h("div",{class:"pin-input"});const inputs=[];let cb=null;
for(let i=0;i<4;i++){
  const inp=h("input",{class:"pin-digit",type:"tel",maxLength:"1",inputMode:"numeric",pattern:"[0-9]*"});
  inp.addEventListener("input",()=>{inp.value=inp.value.replace(/\D/g,"").slice(0,1);if(inp.value&&i<3)inputs[i+1].focus();const full=inputs.map(x=>x.value).join("");if(full.length===4&&cb)setTimeout(()=>cb(full),100)});
  inp.addEventListener("keydown",e=>{if(e.key==="Backspace"&&!inp.value&&i>0){inputs[i-1].focus();inputs[i-1].value=""}});
  inputs.push(inp);wrap.append(inp);
}
setTimeout(()=>inputs[0].focus(),50);
const obj={wrap,getValue:()=>inputs.map(x=>x.value).join("")};
Object.defineProperty(obj,"onComplete",{set:fn=>{cb=fn}});return obj;
}

const BELTS=[
  {id:"white",name:"White",fill:"#f0ede8",stroke:"#ccc8c0",tab:"#222"},
  {id:"blue",name:"Blue",fill:"#4a6fa5",stroke:"#3a5a8a",tab:"#222"},
  {id:"purple",name:"Purple",fill:"#6b4d8a",stroke:"#553d70",tab:"#222"},
  {id:"brown",name:"Brown",fill:"#7a5c3a",stroke:"#5e452a",tab:"#222"},
  {id:"black",name:"Black",fill:"#222",stroke:"#111",tab:"#C4454A"}
];

function renderBeltSVG(beltId,stripes,width){
const w=width||80,ht=Math.round(w*0.32);
const belt=BELTS.find(b=>b.id===beltId)||BELTS[0];
const st=Math.min(Math.max(stripes||0,0),4);
const s=document.createElementNS("http://www.w3.org/2000/svg","svg");
s.setAttribute("width",w);s.setAttribute("height",ht);s.setAttribute("viewBox","0 0 200 64");
// Belt body — crossed ends
const beltPath=`
  M10,22 L75,22 C80,22 82,18 85,16 L100,8 L115,16 C118,18 120,22 125,22 L190,22
  L190,42 L125,42 C120,42 118,46 115,48 L100,56 L85,48 C82,46 80,42 75,42 L10,42 Z
`;
s.innerHTML=`<path d="${beltPath}" fill="${belt.fill}" stroke="${belt.stroke}" stroke-width="1.5"/>`;
// Black tab on left end
s.innerHTML+=`<rect x="10" y="22" width="24" height="20" rx="1" fill="${belt.tab}"/>`;
// Stripes on tab
for(let i=0;i<st;i++){
  const sx=16+i*5;
  s.innerHTML+=`<rect x="${sx}" y="23" width="3" height="18" rx="0.5" fill="#f0ede8"/>`;
}
// Black tab on right end (brand tag)
s.innerHTML+=`<rect x="170" y="22" width="20" height="20" rx="1" fill="#222"/>`;
return s;
}

const isInPositional=path.length>0;
const isInSeries=!!seriesPath;
const isInBelt=!!beltPath;
if(isInPositional||isInSeries||isInBelt){
  tb.append(h("button",{onClick:()=>{
    if(path.length>0)path=path.slice(0,-1);
    else if(seriesPath)seriesPath=null;
    else if(beltPath)beltPath=null;
    editing=null;adding=null;formDraft={};render();
  }},"Back"));
}
if(isInPositional){
  const bc=h("div",{class:"breadcrumb"});
  bc.append(h("span",{class:"link",onClick:()=>{path=[];render()}},"All"));
  if(path[0]){const g=data.groups.find(x=>x.id===path[0]);if(g){bc.append(h("span",null," > "));bc.append(h("span",{class:path.length===1?"current":"link",onClick:()=>{path=[path[0]];render()}},g.name))}}
  if(path[1]){const n=pm[path[1]];if(n){bc.append(h("span",null," > "));bc.append(h("span",{class:"current"},n))}}
  tb.append(bc);
}
if(isInSeries){const s=series.find(x=>x.id===seriesPath);if(s)tb.append(h("div",{class:"breadcrumb"},h("span",{class:"link",onClick:()=>{seriesPath=null;render()}},"Series"),h("span",null," > "),h("span",{class:"current"},s.name)))}
if(isInBelt){const b=beltProgress.find(x=>x.id===beltPath);if(b)tb.append(h("div",{class:"breadcrumb"},h("span",{class:"link",onClick:()=>{beltPath=null;render()}},"Belt Progression"),h("span",null," > "),h("span",{class:"current"},b.from[0].toUpperCase()+b.from.slice(1)+" to "+b.to[0].toUpperCase()+b.to.slice(1))))}
tb.append(h("div",{class:"spacer"}));
if(!isAdmin&&curUser&&isInPositional)tb.append(h("button",{class:"mygame-btn"+(filterMyGame?" active":""),onClick:()=>{filterMyGame=!filterMyGame;render()}},filterMyGame?"My game":"My game"));
return tb;
}

// --- Position views ---
function renderGroups(){
const wrap=h("div",null);
data.groups.forEach(g=>{
  const total=g.positions.reduce((s,p)=>s+Object.values(p.actions).reduce((s2,arr)=>s2+arr.filter(ctxMatch).length,0),0);
  wrap.append(h("button",{class:"group-card",style:{borderLeftColor:g.color},onClick:()=>{path=[g.id];render()}},
    h("h3",null,g.name),h("div",{class:"meta"},g.positions.length+" positions · "+total+" techniques")));
});

}

function renderPositions(group,pm){
const wrap=h("div",null);
const grid=h("div",{class:"pos-grid"});
group.positions.forEach(p=>{
  const cats=CATS.filter(c=>p.actions[c]?.filter(ctxMatch).length>0);
  const total=cats.reduce((s,c)=>s+p.actions[c].filter(ctxMatch).length,0);
  const goTos=cats.reduce((s,c)=>s+p.actions[c].filter(x=>x.priority===1&&ctxMatch(x)).length,0);
  const myCount=curUser&&!isAdmin?cats.reduce((s,c)=>s+p.actions[c].filter(x=>ctxMatch(x)&&isMyGame(x.id)).length,0):0;
  if(filterMyGame&&myCount===0)return;
  grid.append(h("button",{class:"pos-card",style:{borderLeftColor:group.color},onClick:()=>{path=[group.id,p.id];editing=null;adding=null;filterP=null;render()}},
    h("h4",null,p.name),
    h("div",{class:"meta"},total+" options"+(goTos?" · "+goTos+" go-to":"")+(myCount?" · ★"+myCount:"")),
    h("div",{class:"tags"},...cats.map(c=>{const m=CATMETA[c];return h("span",{class:"tag",style:{background:m.bg,color:m.t}},m.l+": "+p.actions[c].filter(ctxMatch).length)}))
  ));
});
wrap.append(grid);
if(isAdmin)wrap.append(h("button",{onClick:()=>{addingPos=group.id;render()}},"+ Add position"));
if(addingPos===group.id)wrap.append(renderAddPos(group.id));
return wrap;
}

function renderDetail(pos,pm){
const wrap=h("div",null);
const fb=h("div",{class:"filter-bar"});
[null,1,2,3].forEach(p=>{fb.append(h("button",{class:"filter-btn"+(filterP===p?" active":""),onClick:()=>{filterP=filterP===p?null:p;render()}},p===null?"All":PRIO[p]))});
if(!isAdmin&&curUser)fb.append(h("button",{class:"mygame-btn"+(filterMyGame?" active":""),style:{marginLeft:"8px"},onClick:()=>{filterMyGame=!filterMyGame;render()}},filterMyGame?"★ My game":"☆ My game"));
fb.append(h("div",{class:"spacer"}));
if(isAdmin)fb.append(h("button",{class:"del-btn",onClick:async()=>{if(confirm("Delete this position?")){for(const g of data.groups)g.positions=g.positions.filter(x=>x.id!==pos.id);await saveMaster();path=path.slice(0,1);render()}}},"Delete position"));
wrap.append(fb);

const activeCats=CATS.filter(c=>(pos.actions[c]?.filter(ctxMatch).length>0)||c==="submissions"||c==="passes"||c==="transitions"||c==="risks");
activeCats.forEach(cat=>{
  const m=CATMETA[cat];if(!m)return;
  const allItems=pos.actions[cat]||[];
  const items=allItems.filter(ctxMatch);
  let filtered=filterP?items.filter(i=>i.priority===filterP):items;
  if(filterMyGame)filtered=filtered.filter(item=>isMyGame(item.id));

  const sec=h("div",{class:"cat-section"});
  sec.append(h("div",{class:"cat-header"},
    h("div",{class:"cat-icon",style:{background:m.bg,color:m.t}},m.i),
    h("span",{class:"cat-title"},m.l),
    h("span",{class:"cat-count"},"("+filtered.length+")"),
    h("div",{class:"spacer"}),
    curUser?h("button",{onClick:()=>{adding=adding===cat?null:cat;editing=null;render()}},"+ Add"):null
  ));

  if(filtered.length===0)sec.append(h("div",{class:"empty"},filterMyGame?"No techniques in your game here":items.length?"None at this priority":allItems.length?"Hidden by ruleset filter":"None yet"));

  filtered.forEach(item=>{
    const realIdx=allItems.indexOf(item);
    if(isAdmin&&editing&&editing.cat===cat&&editing.idx===realIdx){
      sec.append(renderItemForm(item,m,pm,pos.id,cat,async(u)=>{Object.assign(allItems[realIdx],u);if(!allItems[realIdx].id)allItems[realIdx].id=genTechId(pos.id,cat,u.name);await saveMaster();editing=null;render()},()=>{editing=null;render()}));
      return;
    }
    const dest=item.leadsTo;const destName=dest==="finish"?"Finish":(pm[dest]||dest);const ctx=item.ctx||"both";
    const starred=isMyGame(item.id);
    const tapCount=(getTodayTaps()[item.id]||0);
    const myNote=getUserNote(item.id);
    const itemEl=h("div",{class:"item",style:{borderLeftColor:m.c}},
      h("div",{class:"item-body"},
        h("div",{class:"item-row"},
          h("span",{class:"item-name"},item.name),
          h("span",{class:"priority-tag",style:{background:item.priority===1?m.bg:"var(--bg2)",color:item.priority===1?m.t:"var(--text3)"}},PRIO[item.priority]),
          ctx!=="both"?h("span",{class:"ctx-tag",style:{background:CTX_C[ctx].bg,color:CTX_C[ctx].t}},ctx==="gi"?"Gi":"No-gi"):null,
          dest&&dest!=="finish"?h("span",{class:"dest-tag",style:{color:m.t,background:m.bg},onClick:()=>{for(const g of data.groups){const p=g.positions.find(x=>x.id===dest);if(p){path=[g.id,dest];editing=null;adding=null;filterP=null;render();return}}}},"→ "+destName):null,
          dest==="finish"?h("span",{class:"dest-finish",style:{color:"#712B13",background:"#FAECE7"}},"→ Finish"):null,
          item.url?h("a",{class:"video-link",href:item.url,target:"_blank",onClick:e=>e.stopPropagation()},"▶ Watch"):null
        ),
        item.notes?h("div",{class:"item-notes"},item.notes):null,
        !isAdmin&&curUser&&myNote&&expandNoteId!==item.id?h("div",{style:{fontSize:"11px",color:"var(--brand2)",marginTop:"4px",fontStyle:"italic",cursor:"pointer"},onClick:()=>{expandNoteId=item.id;render()}},'"'+myNote+'"'):null,
        !isAdmin&&curUser&&expandNoteId===item.id?(()=>{
          const ta=h("textarea",{class:"user-note-ta",placeholder:"My notes on this technique…"});
          ta.value=myNote;
          ta.addEventListener("blur",async()=>{await saveUserNote(item.id,ta.value)});
          const nw=h("div",{class:"user-note-wrap"},ta);
          setTimeout(()=>ta.focus(),0);
          return nw;
        })():null
      ),
      h("div",{class:"item-actions"},
        !isAdmin&&curUser?h("button",{class:"tap-btn"+(tapCount?" tapped":""),onClick:()=>tapTech(item.id)},tapCount?"×"+tapCount:"+1"):null,
        !isAdmin&&curUser?h("button",{class:"note-btn"+(myNote?" has-note":""),onClick:()=>{expandNoteId=expandNoteId===item.id?null:item.id;render()}},"📝"):null,
        !isAdmin&&curUser?h("button",{class:"star-btn"+(starred?" active":""),onClick:()=>toggleMyGame(item.id)},starred?"★":"☆"):null,
        isAdmin?h("button",{style:{fontSize:"11px",padding:"2px 6px"},onClick:()=>{editing={cat,idx:realIdx};adding=null;render()}},"Edit"):null,
        isAdmin?h("button",{class:"del-btn",style:{fontSize:"11px",padding:"2px 6px"},onClick:async()=>{allItems.splice(realIdx,1);await saveMaster();render()}},"×"):null
      )
    );
    sec.append(itemEl);
  });

  if(curUser&&adding===cat)sec.append(renderItemForm(null,m,pm,pos.id,cat,async(item)=>{if(!pos.actions[cat])pos.actions[cat]=[];item.id=genTechId(pos.id,cat,item.name);pos.actions[cat].push(item);await saveMaster();adding=null;formDraft={};render()},()=>{adding=null;formDraft={};render()},true));
  wrap.append(sec);
});

if(curUser){
  const inactiveCats=CATS.filter(c=>!activeCats.includes(c)&&CATMETA[c]);
  if(inactiveCats.length){
    const addC=h("div",{class:"add-cats"},h("span",null,"Add category: "));
    inactiveCats.forEach(c=>{addC.append(h("button",{onClick:()=>{adding=c;render()}},"+ "+CATMETA[c].l))});
    wrap.append(addC);
  }
}
return wrap;
}

function renderItemForm(item,meta,pm,posId,cat,onSave,onCancel,isNew){
const box=h("div",{class:"form-box",style:{borderColor:meta.c}});
// Use formDraft to survive re-renders; seed from item on first open
if(isNew&&!formDraft._seeded){formDraft={_seeded:true,name:"",notes:"",url:"",priority:"2",ctx:"both",leadsTo:""}}
else if(!isNew&&!formDraft._seeded){formDraft={_seeded:true,name:item?.name||"",notes:item?.notes||"",url:item?.url||"",priority:String(item?.priority||2),ctx:item?.ctx||"both",leadsTo:item?.leadsTo||""}}
const nameI=h("input",{value:formDraft.name||"",placeholder:"Technique name"});
nameI.addEventListener("input",()=>{formDraft.name=nameI.value});
const notesI=h("input",{value:formDraft.notes||"",placeholder:"Notes / cues"});
notesI.addEventListener("input",()=>{formDraft.notes=notesI.value});
const urlI=h("input",{value:formDraft.url||"",placeholder:"Video URL (YouTube, Instagram...)",type:"url"});
urlI.addEventListener("input",()=>{formDraft.url=urlI.value});
const prioS=h("select",null,h("option",{value:"1"},"Go-to"),h("option",{value:"2"},"Secondary"),h("option",{value:"3"},"Situational"));
prioS.value=formDraft.priority||"2";prioS.style.width="110px";
prioS.addEventListener("change",()=>{formDraft.priority=prioS.value});
const ctxS=h("select",null,h("option",{value:"both"},"Both"),h("option",{value:"gi"},"Gi only"),h("option",{value:"nogi"},"No-gi only"));
ctxS.value=formDraft.ctx||"both";ctxS.style.width="100px";
ctxS.addEventListener("change",()=>{formDraft.ctx=ctxS.value});
const destS=h("select",null,h("option",{value:""},"-- none --"),h("option",{value:"finish"},"Finish (submission)"));
Object.entries(pm).sort((a,b)=>a[1].localeCompare(b[1])).forEach(([id,n])=>{destS.append(h("option",{value:id},n))});
destS.value=formDraft.leadsTo||"";destS.style.flex="1 1 160px";
destS.addEventListener("change",()=>{formDraft.leadsTo=destS.value});
box.append(h("div",{class:"form-row"},nameI,prioS,ctxS));
box.append(notesI);
box.append(h("div",{style:{marginTop:"8px",marginBottom:"8px"}},urlI));
box.append(h("div",{class:"form-row",style:{alignItems:"center"}},h("span",{style:{fontSize:"12px",color:"var(--text2)"}},"Leads to:"),destS));
box.append(h("div",{class:"form-actions"},
  h("button",{onClick:()=>{const n=(formDraft.name||"").trim();if(!n)return;const u=(formDraft.url||"").trim();onSave({name:n,notes:(formDraft.notes||"").trim(),priority:+formDraft.priority,leadsTo:formDraft.leadsTo||undefined,ctx:formDraft.ctx,url:u||undefined,id:item?.id});formDraft={}}},isNew?"Add":"Save"),
  h("button",{onClick:()=>{formDraft={};onCancel()}},"Cancel")
));
setTimeout(()=>nameI.focus(),0);return box;
}

function renderSeriesDetail(s){
const wrap=h("div",null);
// Header
const hdr=h("div",{style:{marginBottom:"14px"}});
hdr.append(h("div",{style:{fontSize:"18px",fontWeight:"600",marginBottom:"4px"}},s.name));
if(s.description)hdr.append(h("div",{style:{fontSize:"13px",color:"var(--text2)",marginBottom:"8px"}},s.description));
const tags=h("div",{style:{display:"flex",gap:"6px",flexWrap:"wrap"}});
if(s.ctx&&s.ctx!=="both")tags.append(h("span",{class:"ctx-tag",style:{background:CTX_C[s.ctx].bg,color:CTX_C[s.ctx].t,fontSize:"11px",padding:"2px 8px",borderRadius:"var(--radius-sm)",fontWeight:"500"}},s.ctx==="gi"?"Gi only":"No-gi only"));
tags.append(h("span",{style:{fontSize:"11px",color:"var(--text3)"}},s.steps.length+" steps"));
hdr.append(tags);
wrap.append(hdr);

s.steps.forEach((step,i)=>{
  if(isAdmin&&editingSeriesStep===step.id){
    const box=h("div",{class:"form-box",style:{marginBottom:"6px",borderColor:s.color||"var(--border)"}});
    const ni=h("input",{value:step.name,placeholder:"Step name"});
    const noti=h("textarea",{placeholder:"Notes / explanation",style:{width:"100%",minHeight:"72px",fontSize:"13px",padding:"7px",borderRadius:"var(--radius-sm)",border:"1px solid var(--border)",background:"var(--bg3)",color:"var(--text)",fontFamily:"inherit",lineHeight:"1.5",resize:"vertical"}});
    noti.value=step.notes||"";
    const urlI=h("input",{value:step.url||"",placeholder:"Video URL (optional)",type:"url",style:{marginTop:"6px"}});
    box.append(ni);box.append(h("div",{style:{marginTop:"6px"}},noti));box.append(urlI);
    box.append(h("div",{class:"form-actions",style:{marginTop:"8px"}},
      h("button",{onClick:async()=>{step.name=ni.value.trim()||step.name;step.notes=noti.value.trim();step.url=urlI.value.trim()||undefined;await saveSeries();editingSeriesStep=null;render()}},"Save"),
      h("button",{onClick:()=>{editingSeriesStep=null;render()}},"Cancel")
    ));
    wrap.append(box);
    return;
  }
  const stepEl=h("div",{class:"series-step",style:{borderLeftColor:s.color||"#888"}});
  const numEl=h("div",{class:"step-num"},String(i+1));
  const body=h("div",{class:"step-body"});
  const nameRow=h("div",{style:{display:"flex",alignItems:"center",gap:"8px",marginBottom:"3px"}});
  nameRow.append(h("span",{class:"step-name"},step.name));
  if(step.url)nameRow.append(h("a",{class:"video-link",href:step.url,target:"_blank",onClick:e=>e.stopPropagation()},"Watch"));
  body.append(nameRow);
  if(step.notes)body.append(h("div",{class:"step-notes"},step.notes));
  const actions=h("div",{style:{display:"flex",gap:"4px",marginTop:"6px"}});
  if(isAdmin){
    actions.append(h("button",{style:{fontSize:"11px",padding:"2px 6px"},onClick:()=>{editingSeriesStep=step.id;render()}},"Edit"));
    actions.append(h("button",{class:"del-btn",style:{fontSize:"11px",padding:"2px 6px"},onClick:async()=>{s.steps.splice(i,1);await saveSeries();render()}},"x"));
    // Move up/down
    if(i>0)actions.append(h("button",{style:{fontSize:"11px",padding:"2px 6px"},onClick:async()=>{const t=s.steps[i];s.steps[i]=s.steps[i-1];s.steps[i-1]=t;await saveSeries();render()}},"Up"));
    if(i<s.steps.length-1)actions.append(h("button",{style:{fontSize:"11px",padding:"2px 6px"},onClick:async()=>{const t=s.steps[i];s.steps[i]=s.steps[i+1];s.steps[i+1]=t;await saveSeries();render()}},"Down"));
  }
  if(actions.children.length)body.append(actions);
  stepEl.append(numEl,body);
  wrap.append(stepEl);
});

// Add step form
if(isAdmin){
  if(addingSeriesStep){
    const box=h("div",{class:"form-box",style:{marginTop:"8px",borderColor:s.color||"var(--border)"}});
    const ni=h("input",{placeholder:"Step name"});
    const noti=h("textarea",{placeholder:"Notes / explanation",style:{width:"100%",minHeight:"72px",fontSize:"13px",padding:"7px",borderRadius:"var(--radius-sm)",border:"1px solid var(--border)",background:"var(--bg3)",color:"var(--text)",fontFamily:"inherit",lineHeight:"1.5",resize:"vertical",marginTop:"6px"}});
    const urlI=h("input",{value:"",placeholder:"Video URL (optional)",type:"url",style:{marginTop:"6px"}});
    box.append(h("div",{style:{fontWeight:"500",fontSize:"13px",marginBottom:"8px"}},"Add Step"));
    box.append(ni);box.append(noti);box.append(urlI);
    box.append(h("div",{class:"form-actions",style:{marginTop:"8px"}},
      h("button",{onClick:async()=>{const n=ni.value.trim();if(!n)return;s.steps.push({id:"step-"+Date.now().toString(36),name:n,notes:noti.value.trim(),url:urlI.value.trim()||undefined});await saveSeries();addingSeriesStep=false;render()}},"Add"),
      h("button",{onClick:()=>{addingSeriesStep=false;render()}},"Cancel")
    ));
    setTimeout(()=>ni.focus(),0);
    wrap.append(box);
  } else {
    wrap.append(h("button",{style:{marginTop:"8px"},onClick:()=>{addingSeriesStep=true;render()}},"+ Add Step"));
  }
  // Delete series
  wrap.append(h("div",{style:{marginTop:"16px",paddingTop:"12px",borderTop:"1px solid var(--border)"}},
    h("button",{class:"del-btn",style:{fontSize:"11px"},onClick:async()=>{if(confirm("Delete this series?"+s.name)){series=series.filter(x=>x.id!==s.id);await saveSeries();seriesPath=null;render()}}},"Delete series")
  ));
}
return wrap;
}

// --- Belt Progression ---
function renderBeltList(){
const wrap=h("div",null);
const BELT_COLORS={white:"#aaa",blue:"#4a6fa5",purple:"#6b4d8a",brown:"#7a5c3a",black:"#222"};
beltProgress.forEach(b=>{
  const fromColor=BELT_COLORS[b.from]||"#888";
  const cap=s=>s[0].toUpperCase()+s.slice(1);
  const card=h("button",{class:"belt-card",style:{borderLeftColor:fromColor},onClick:()=>{beltPath=b.id;path=[];render()}});

  // Visual row: belt image — arrow — belt image
  const visual=h("div",{class:"belt-card-visual"});
  const fromSide=h("div",{class:"belt-card-side"});
  fromSide.append(h("div",{class:"belt-card-label"},cap(b.from)));
  fromSide.append(renderBeltSVG(b.from,0,120));
  const toSide=h("div",{class:"belt-card-side"});
  toSide.append(h("div",{class:"belt-card-label"},cap(b.to)));
  toSide.append(renderBeltSVG(b.to,0,120));
  visual.append(fromSide,h("div",{class:"belt-card-arrow"},"›"),toSide);
  card.append(visual);

  // Description row
  const meta=h("div",{style:{fontSize:"12px",color:"var(--text3)"}});
  if(b.description)meta.append(document.createTextNode(b.description));
  meta.append(h("span",{style:{marginLeft:b.description?"8px":"0",opacity:".7"}},b.items.length+" items"));
  card.append(meta);
  wrap.append(card);
});
if(isAdmin){
  if(addingBelt){
    const box=h("div",{class:"form-box",style:{marginTop:"10px"}});
    const froms=h("select",null,...["white","blue","purple","brown"].map(b=>h("option",{value:b},b[0].toUpperCase()+b.slice(1))));
    const tos=h("select",null,...["blue","purple","brown","black"].map(b=>h("option",{value:b},b[0].toUpperCase()+b.slice(1))));
    tos.value="blue";
    const di=h("input",{placeholder:"Description"});
    box.append(h("div",{style:{fontWeight:"500",fontSize:"14px",marginBottom:"10px"}},"New Belt Progression"));
    box.append(h("div",{class:"form-row"},h("div",{style:{flex:"1"}},h("div",{style:{fontSize:"11px",color:"var(--text3)",marginBottom:"4px"}},"From"),froms),h("div",{style:{flex:"1"}},h("div",{style:{fontSize:"11px",color:"var(--text3)",marginBottom:"4px"}},"To"),tos)));
    box.append(di);
    box.append(h("div",{class:"form-actions",style:{marginTop:"8px"}},
      h("button",{onClick:async()=>{const from=froms.value,to=tos.value;const id=from+"-"+to;beltProgress.push({id,from,to,color:BELT_COLORS[from]||"#888",description:di.value.trim(),items:[]});await saveBeltProgress();addingBelt=false;beltPath=id;render()}},"Create"),
      h("button",{onClick:()=>{addingBelt=false;render()}},"Cancel")
    ));
    wrap.append(box);
  } else {
    wrap.append(h("button",{style:{marginTop:"8px"},onClick:()=>{addingBelt=true;render()}},"+ New Progression"));
  }
}
return wrap;
}

function renderBeltDetail(b){
const BELT_COLORS={white:"#aaa",blue:"#4a6fa5",purple:"#6b4d8a",brown:"#7a5c3a",black:"#222"};
const color=BELT_COLORS[b.from]||b.color||"#888";
const wrap=h("div",null);
const hdr=h("div",{style:{marginBottom:"14px"}});
hdr.append(h("div",{style:{fontSize:"18px",fontWeight:"600",marginBottom:"4px"}},b.from[0].toUpperCase()+b.from.slice(1)+" to "+b.to[0].toUpperCase()+b.to.slice(1)));
if(b.description)hdr.append(h("div",{style:{fontSize:"13px",color:"var(--text2)",marginBottom:"8px"}},b.description));
wrap.append(hdr);

// Group items by category
const cats=[...new Set(b.items.map(x=>x.category||"General"))];
cats.forEach(cat=>{
  wrap.append(h("div",{class:"belt-group-header"},cat));
  b.items.filter(item=>(item.category||"General")===cat).forEach((item,globalIdx)=>{
    const realIdx=b.items.indexOf(item);
    const el=h("div",{class:"belt-item",style:{borderLeftColor:color}});
    const header=h("div",{class:"belt-item-header"});
    header.append(h("span",{class:"belt-item-name"},item.name));
    if(item.url)header.append(h("a",{class:"video-link",href:item.url,target:"_blank",onClick:e=>e.stopPropagation()},"Watch"));
    el.append(header);
    if(item.notes)el.append(h("div",{class:"belt-item-notes"},item.notes));
    if(isAdmin){
      const acts=h("div",{style:{display:"flex",gap:"4px",marginTop:"6px"}});
      acts.append(h("button",{class:"del-btn",style:{fontSize:"11px",padding:"2px 6px"},onClick:async()=>{b.items.splice(realIdx,1);await saveBeltProgress();render()}},"x"));
      el.append(acts);
    }
    wrap.append(el);
  });
});

if(isAdmin){
  // Add item form
  const box=h("div",{class:"form-box",style:{marginTop:"14px",borderColor:color}});
  const ni=h("input",{placeholder:"Skill / technique name"});
  const noti=h("textarea",{placeholder:"Coaching notes — what does this look like at this level?",style:{width:"100%",minHeight:"72px",fontSize:"13px",padding:"7px",borderRadius:"var(--radius-sm)",border:"1px solid var(--border)",background:"var(--bg3)",color:"var(--text)",fontFamily:"inherit",lineHeight:"1.5",resize:"vertical",marginTop:"6px"}});
  const cati=h("input",{placeholder:"Category (e.g. Guard, Passing, Concepts)"});
  const urli=h("input",{placeholder:"Video URL (optional)",type:"url"});
  box.append(h("div",{style:{fontWeight:"500",fontSize:"13px",marginBottom:"8px"}},"Add Item"));
  box.append(ni);box.append(noti);
  box.append(h("div",{style:{marginTop:"6px"}},cati));
  box.append(h("div",{style:{marginTop:"6px"}},urli));
  box.append(h("div",{class:"form-actions",style:{marginTop:"8px"}},
    h("button",{onClick:async()=>{const n=ni.value.trim();if(!n)return;b.items.push({id:"bi-"+Date.now().toString(36),name:n,notes:noti.value.trim(),category:cati.value.trim()||"General",url:urli.value.trim()||undefined});await saveBeltProgress();ni.value="";noti.value="";cati.value="";urli.value="";render()}},"Add"),
  ));
  wrap.append(box);
  wrap.append(h("div",{style:{marginTop:"16px",paddingTop:"12px",borderTop:"1px solid var(--border)"}},
    h("button",{class:"del-btn",style:{fontSize:"11px"},onClick:async()=>{if(confirm("Delete this progression?")){beltProgress=beltProgress.filter(x=>x.id!==b.id);await saveBeltProgress();beltPath=null;render()}}},"Delete progression")
  ));
}
return wrap;
}
setInterval(()=>{if(fbReady)refreshData()},30000);
document.addEventListener("visibilitychange",()=>{if(!document.hidden&&fbReady)refreshData()});

// Boot
loadAll();
-e 
</script>
