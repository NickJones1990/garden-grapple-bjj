<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Garden Grapple — Position Map</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><circle cx='16' cy='16' r='14' fill='%231a3a3a'/><text x='16' y='22' text-anchor='middle' font-size='18' fill='%238B9E7E'>🪷</text></svg>">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#f7f6f3;--bg2:#eeeee9;--bg3:#fff;--text:#1a1a1a;--text2:#555;--text3:#999;--border:#ddd;--brand1:#1a3a3a;--brand2:#2d5252;--brand3:#8B9E7E;--brand4:#e8ede4;--red:#C4454A;--radius:10px;--radius-sm:6px;--star:#BA7517}
@media(prefers-color-scheme:dark){:root{--bg:#1a1a1a;--bg2:#252525;--bg3:#2a2a2a;--text:#e5e5e5;--text2:#aaa;--text3:#666;--border:#333}}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);max-width:820px;margin:0 auto;padding:12px;line-height:1.5;-webkit-font-smoothing:antialiased}
button{font-family:inherit;cursor:pointer;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-sm);padding:4px 10px;font-size:12px;color:var(--text2);transition:all .15s}
button:hover{border-color:#aaa;color:var(--text)}button:active{transform:scale(.97)}
input,select{font-family:inherit;font-size:14px;padding:8px 10px;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--bg3);color:var(--text);width:100%}
input:focus,select:focus{outline:none;border-color:var(--brand3)}select{width:auto}
.login-wrap{display:flex;align-items:center;justify-content:center;min-height:80vh}
.login-box{width:100%;max-width:360px;text-align:center}
.login-box h2{font-size:16px;font-weight:500;margin:16px 0 12px;color:var(--text)}
.login-box .sub{font-size:12px;color:var(--text3);margin-bottom:16px}
.user-list{display:flex;flex-direction:column;gap:6px;margin-bottom:16px}
.user-btn{padding:12px 16px;text-align:left;font-size:14px;font-weight:500;border-radius:var(--radius);border:1px solid var(--border);background:var(--bg3);cursor:pointer;display:flex;align-items:center;gap:10px}
.user-btn:hover{border-color:var(--brand3)}
.user-avatar{width:36px;height:36px;border-radius:50%;background:var(--brand1);color:var(--brand3);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:500;flex-shrink:0}
.user-info{flex:1}.user-info .name{color:var(--text)}.user-info .meta{font-size:11px;color:var(--text3);font-weight:400}
.pin-input{display:flex;gap:8px;justify-content:center;margin:12px 0}
.pin-digit{width:48px;height:56px;text-align:center;font-size:24px;font-weight:500;letter-spacing:2px;border-radius:var(--radius);border:2px solid var(--border);background:var(--bg3)}
.pin-digit:focus{border-color:var(--brand3)}
.pin-error{color:var(--red);font-size:12px;margin-top:4px}
.header{display:flex;align-items:center;gap:12px;padding:14px 16px;background:linear-gradient(135deg,#1a3a3a,#2d5252);border-radius:var(--radius);margin-bottom:12px;flex-wrap:wrap}
.header svg{flex-shrink:0}.header-text{flex:1;min-width:120px}
.header h1{font-size:17px;font-weight:600;color:#e8ede4;letter-spacing:.08em;line-height:1.2}
.header .sub{font-size:10px;color:#8B9E7E;letter-spacing:.12em;margin-top:2px}
.header-right{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.ctx-btns{display:flex;gap:4px}
.ctx-btn{border:none;padding:5px 12px;border-radius:var(--radius-sm);font-size:11px;font-weight:500;background:rgba(255,255,255,.06);color:#8B9E7E;cursor:pointer}
.ctx-btn.active-all{background:rgba(255,255,255,.15);color:#e8ede4}
.ctx-btn.active-gi{background:#8B9E7E;color:#1a3a3a}
.ctx-btn.active-nogi{background:#5a8a8a;color:#1a3a3a}
.user-pill{border:none;padding:4px 10px;border-radius:var(--radius-sm);font-size:11px;background:rgba(255,255,255,.1);color:#8B9E7E;cursor:pointer;display:flex;align-items:center;gap:4px}
.toolbar{display:flex;align-items:center;gap:6px;margin-bottom:10px;flex-wrap:wrap}
.breadcrumb{font-size:12px;color:var(--text3);display:flex;align-items:center;gap:4px}
.breadcrumb span.link{color:var(--text2);cursor:pointer}.breadcrumb span.link:hover{color:var(--text)}
.breadcrumb span.current{color:var(--text);font-weight:500}
.spacer{flex:1}
.group-card{text-align:left;padding:14px 16px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);cursor:pointer;width:100%;margin-bottom:8px;border-left:4px solid #888}
.group-card h3{font-weight:500;font-size:15px;margin-bottom:2px}.group-card .meta{font-size:12px;color:var(--text3)}
.pos-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:8px;margin-bottom:12px}
.pos-card{text-align:left;padding:12px 14px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);cursor:pointer;border-left:3px solid #888}
.pos-card h4{font-weight:500;font-size:14px;margin-bottom:4px}.pos-card .meta{font-size:12px;color:var(--text3)}
.pos-card .tags{display:flex;gap:4px;margin-top:6px;flex-wrap:wrap}
.tag{font-size:10px;padding:1px 6px;border-radius:var(--radius-sm)}
.cat-section{margin-bottom:20px}
.cat-header{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.cat-icon{width:22px;height:22px;border-radius:var(--radius-sm);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:500}
.cat-title{font-size:14px;font-weight:500}.cat-count{font-size:12px;color:var(--text3)}
.item{display:flex;align-items:flex-start;gap:8px;padding:8px 12px;border-radius:var(--radius-sm);border:1px solid var(--border);border-left:3px solid #888;background:var(--bg3);margin-bottom:4px}
.item-body{flex:1;min-width:0}
.item-row{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.item-name{font-weight:500;font-size:14px}.item-notes{font-size:13px;color:var(--text2);margin-top:2px}
.item-actions{display:flex;gap:4px;flex-shrink:0;align-items:center}
.star-btn{border:none;background:none;font-size:18px;padding:0 2px;cursor:pointer;line-height:1;color:var(--text3);transition:color .15s}
.star-btn.active{color:var(--star)}
.priority-tag,.ctx-tag,.dest-tag,.dest-finish{font-size:10px;padding:1px 6px;border-radius:var(--radius-sm);font-weight:500}
.dest-tag{cursor:pointer}
.filter-bar{display:flex;gap:4px;margin-bottom:12px;align-items:center;flex-wrap:wrap}
.filter-btn{font-size:12px;opacity:.5}.filter-btn.active{opacity:1;font-weight:500}
.mygame-btn{font-size:12px;padding:3px 10px;border-radius:var(--radius-sm)}
.mygame-btn.active{background:var(--brand1);color:var(--brand4);border-color:var(--brand1)}
.form-box{padding:12px;border-radius:var(--radius-sm);background:var(--bg2);margin-top:8px}
.form-row{display:flex;gap:8px;margin-bottom:8px;flex-wrap:wrap}
.form-actions{display:flex;gap:6px}
.empty{font-size:13px;color:var(--text3);padding:4px 0;font-style:italic}
.del-btn{color:var(--red);border-color:transparent;background:transparent}.del-btn:hover{color:#a00}
.add-cats{margin-top:8px;font-size:12px;color:var(--text3)}
.admin-bar{background:var(--bg2);padding:8px 12px;border-radius:var(--radius-sm);margin-bottom:10px;font-size:12px;display:flex;align-items:center;gap:8px;color:var(--text2);flex-wrap:wrap}
.admin-bar .badge{background:var(--brand1);color:var(--brand4);padding:2px 8px;border-radius:var(--radius-sm);font-size:10px;font-weight:500}
@media(max-width:500px){.header{padding:12px}.header h1{font-size:15px}.pos-grid{grid-template-columns:1fr}.pin-digit{width:42px;height:48px;font-size:20px}}
</style>
</head>

ide guard","priority":3,"leadsTo":"finish","ctx":"gi","id":"top-closed-guard_submissions_ezekiel-choke"}],"transitions":[],"risks":[{"name":"Triangle","notes":"Break posture and angle \u2014 elbows in, posture up","priority":1,"leadsTo":"finish","ctx":"both","id":"top-closed-guard_risks_triangle"},{"name":"Armbar","notes":"High guard, hip escape \u2014 don't reach with one hand","priority":1,"leadsTo":"finish","ctx":"both","id":"top-closed-guard_risks_armbar"},{"name":"Kimura","notes":"Overhook trap \u2014 pull elbow back","priority":2,"leadsTo":"finish","ctx":"both","id":"top-closed-guard_risks_kimura"},{"name":"Hip bump sweep","notes":"They sit up explosive \u2014 base out wide","priority":1,"leadsTo":"bottom-mount","ctx":"both","id":"top-closed-guard_risks_hip-bump-sweep"},{"name":"Guillotine","notes":"Head too low \u2014 posture immediately","priority":2,"leadsTo":"finish","ctx":"both","id":"top-closed-guard_risks_guillotine"}]}},{"id":"top-open-guard","name":"Open guard (top)","actions":{"passes":[{"name":"Toreando","notes":"Control ankles/pants, bull rush past","priority":1,"leadsTo":"top-side-control","ctx":"both","id":"top-open-guard_passes_toreando"},{"name":"Knee cut","notes":"Underhook + cross grip, slice knee through","priority":1,"leadsTo":"top-side-control","ctx":"both","id":"top-open-guard_passes_knee-cut"},{"name":"Leg drag","notes":"Pin legs to one side, walk past","priority":1,"leadsTo":"top-side-control","ctx":"both","id":"top-open-guard_passes_leg-drag"},{"name":"Over-under pass","notes":"One arm under leg, one over, smash","priority":2,"leadsTo":"top-side-control","ctx":"both","id":"top-open-guard_passes_over-under-pass"},{"name":"X-pass","notes":"Step around outside of knee line","priority":2,"leadsTo":"top-side-control","ctx":"both","id":"top-open-guard_passes_x-pass"},{"name":"Long step pass","notes":"Off failed knee cut \u2014 step far leg back","priority":2,"leadsTo":"top-side-control","ctx":"both","id":"top-open-guard_passes_long-step-pass"}],"submissions":[],"transitions":[{"name":"Smash to half guard","notes":"Pressure into half, work from there","priority":2,"leadsTo":"top-half-guard","ctx":"both","id":"top-open-guard_transitions_smash-to-half-guard"},{"name":"Backstep to outside ashi","notes":"Step back over guard into outside ashi","priority":2,"leadsTo":"bottom-outside-ashi","ctx":"nogi","id":"top-open-guard_transitions_backstep-to-outside-ashi"}],"risks":[{"name":"Collar-sleeve sweep","notes":"Push-pull \u2014 kill grips early","priority":1,"leadsTo":"bottom-open-guard","ctx":"gi","id":"top-open-guard_risks_collar-sleeve-sweep"},{"name":"DLR hook","notes":"They hook lead leg \u2014 strip or backstep","priority":1,"leadsTo":"top-dlr","ctx":"both","id":"top-open-guard_risks_dlr-hook"},{"name":"Berimbolo","notes":"Inverted from DLR \u2014 don't let them invert","priority":2,"leadsTo":"bottom-turtle","ctx":"both","id":"top-open-guard_risks_berimbolo"},{"name":"Leg lock entry","notes":"They pull into ashi \u2014 boot immediately","priority":2,"leadsTo":"bottom-ashi-garami","ctx":"nogi","id":"top-open-guard_risks_leg-lock-entry"}]}},{"id":"top-half-guard","name":"Half guard (top)","actions":{"passes":[{"name":"Knee cut pass","notes":"Crossface + underhook, knee across thigh","priority":1,"leadsTo":"top-side-control","ctx":"both","id":"top-half-guard_passes_knee-cut-pass"},{"name":"Smash pass","notes":"Flatten, crossface, hip switch, slide through","priority":1,"leadsTo":"top-side-control","ctx":"both","id":"top-half-guard_passes_smash-pass"},{"name":"Backstep pass","notes":"Step over to leg drag position","priority":2,"leadsTo":"top-side-control","ctx":"both","id":"top-half-guard_passes_backstep-pass"},{"name":"Mount transition","notes":"Free leg, slide directly to mount","priority":2,"leadsTo":"top-mount","ctx":"both","id":"top-half-guard_passes_mount-transition"}],"submissions":[{"name":"D'arce choke","notes":"When they go to side for underhook","priority":2,"leadsTo":"finish","ctx":"both","id":"top-half-guard_submissions_darce-choke"},{"name":"Kimura","notes":"When they reach for underhook \u2014 2-on-1","priority":2,"leadsTo":"finish","ctx":"both","id":"top-half-guard_submissions_kimura"},{"name":"Kneebar","notes":"From backstep \u2014 belly-down on trapped leg","priority":2,"leadsTo":"finish","ctx":"both","id":"top-half-guard_submissions_kneebar"}],"transitions":[],"risks":[{"name":"Underhook sweep","notes":"Deep underhook \u2014 crossface hard, whizzer","priority":1,"leadsTo":"bottom-half-guard","ctx":"both","id":"top-half-guard_risks_underhook-sweep"},{"name":"Lockdown","notes":"They trap your leg \u2014 posture up, strip","priority":2,"leadsTo":"bottom-half-guard","ctx":"both","id":"top-half-guard_risks_lockdown"},{"name":"Back take","notes":"Dogfight circle behind \u2014 keep hip control","priority":2,"leadsTo":"bottom-turtle","ctx":"both","id":"top-half-guard_risks_back-take"},{"name":"Leg lock entry","notes":"They catch leg during backstep \u2014 boot free","priority":2,"leadsTo":"bottom-ashi-garami","ctx":"nogi","id":"top-half-guard_risks_leg-lock-entry"}]}},{"id":"top-side-control","name":"Side control (top)","actions":{"submissions":[{"name":"Americana","notes":"Paint arm to mat, figure-4","priority":1,"leadsTo":"finish","ctx":"both","id":"top-side-control_submissions_americana"},{"name":"Kimura","notes":"North-south or when they reach across","priority":1,"leadsTo":"finish","ctx":"both","id":"top-side-control_submissions_kimura"},{"name":"Arm triangle","notes":"Walk around head, squeeze","priority":2,"leadsTo":"finish","ctx":"both","id":"top-side-control_submissions_arm-triangle"},{"name":"Paper cutter","notes":"Deep lapel grip across throat","priority":2,"leadsTo":"finish","ctx":"gi","id":"top-side-control_submissions_paper-cutter"},{"name":"Baseball bat choke","notes":"Set grips, spin to NS or mount","priority":3,"leadsTo":"finish","ctx":"gi","id":"top-side-control_submissions_baseball-bat-choke"}],"transitions":[{"name":"Mount","notes":"Knee const CATMETA={entries:{l:"Entries",i:"EN",c:"#639922",bg:"#EAF3DE",t:"#27500A"},takedowns:{l:"Takedowns",i:"TD",c:"#7F77DD",bg:"#EEEDFE",t:"#3C3489"},submissions:{l:"Submissions",i:"X",c:"#D85A30",bg:"#FAECE7",t:"#712B13"},sweeps:{l:"Sweeps",i:"SW",c:"#1D9E75",bg:"#E1F5EE",t:"#085041"},passes:{l:"Passes",i:"P",c:"#7F77DD",bg:"#EEEDFE",t:"#3C3489"},transitions:{l:"Transitions / escapes",i:"T",c:"#378ADD",bg:"#E6F1FB",t:"#0C447C"},risks:{l:"Risks / threats",i:"!",c:"#BA7517",bg:"#FAEEDA",t:"#633806"}};
const PRIO={1:"Go-to",2:"Secondary",3:"Situational"};
const CATS=["entries","takedowns","passes","submissions","sweeps","transitions","risks"];
const CTX_C={gi:{bg:"#EEEDFE",t:"#3C3489"},nogi:{bg:"#E6F1FB",t:"#0C447C"}};

let data,users,curUser=null,isAdmin=false;
let path=[],filterP=null,filterCtx="all",filterMyGame=false,editing=null,adding=null,addingPos=null;
let loginState="list",loginTarget=null,loginMode=null,pinError="";

function ls(k){try{return JSON.parse(localStorage.getItem(k))}catch{return null}}
function ss(k,v){try{localStorage.setItem(k,JSON.stringify(v))}catch{}}
function loadAll(){data=ls(MASTER_KEY)||JSON.parse(JSON.stringify(DEFAULT_DATA));users=ls(USERS_KEY)||[];const cu=ls(CUR_USER_KEY);if(cu){curUser=users.find(u=>u.name===cu)||null;if(curUser)filterCtx=curUser.filterCtx||"all"}if(!ls(ADMIN_PIN_KEY))ss(ADMIN_PIN_KEY,"0000")}
function saveMaster(){ss(MASTER_KEY,data)}
function saveUsers(){ss(USERS_KEY,users)}
function getUserGame(){return curUser?.myGame||{}}

// Technique IDs — stable across reordering
function genTechId(posId,cat,name){const slug=name.toLowerCase().replace(/\s+/g,"-").replace(/[^a-z0-9-]/g,"").slice(0,30);return posId+"_"+cat+"_"+slug+"_"+Date.now().toString(36)}
function isMyGame(techId){return!!getUserGame()[techId]}
function toggleMyGame(techId){if(!curUser||isAdmin)return;if(curUser.myGame[techId])delete curUser.myGame[techId];else curUser.myGame[techId]=true;saveUsers();render()}

function posMap(){const m={};data.groups.forEach(g=>g.positions.forEach(p=>{m[p.id]=p.name}));return m}
function ctxMatch(item){return filterCtx==="all"||(item.ctx||"both")==="both"||(item.ctx||"both")===filterCtx}
function h(tag,props,...kids){const el=document.createElement(tag);if(props)Object.entries(props).forEach(([k,v])=>{if(k==="style"&&typeof v==="object")Object.assign(el.style,v);else if(k.startsWith("on"))el.addEventListener(k.slice(2).toLowerCase(),v);else if(k==="class")el.className=v;else el.setAttribute(k,v)});kids.flat(9).forEach(c=>{if(c!=null&&c!==false)el.append(typeof c==="string"||typeof c==="number"?document.createTextNode(c):c)});return el}
function initials(name){return name.split(/\s+/).map(w=>w[0]).join("").toUpperCase().slice(0,2)}
function dlJSON(obj,filename){const b=new Blob([JSON.stringify(obj,null,2)],{type:"application/json"});const a=document.createElement("a");a.href=URL.createObjectURL(b);a.download=filename;a.click();URL.revokeObjectURL(a.href)}
function readJSON(cb){const fi=document.createElement("input");fi.type="file";fi.accept=".json";fi.onchange=e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>{try{cb(JSON.parse(ev.target.result))}catch{alert("Invalid JSON file")}};r.readAsText(f)};fi.click()}

function render(){
const app=document.getElementById("app");app.innerHTML="";
if(!curUser){app.append(renderLogin());return}
const pm=posMap();
app.append(renderHeader());
if(isAdmin)app.append(renderAdminBar());
app.append(renderToolbar(pm));
if(path.length===0)app.append(renderGroups());
else if(path.length===1){const g=data.groups.find(x=>x.id===path[0]);if(g)app.append(renderPositions(g,pm))}
else if(path.length===2){const g=data.groups.find(x=>x.id===path[0]);const p=g?.positions.find(x=>x.id===path[1]);if(p)app.append(renderDetail(p,pm))}
}

function renderLogin(){
const wrap=h("div",{class:"login-wrap"});
const box=h("div",{class:"login-box"});
box.append(renderLogoSVG(64));
box.append(h("h2",null,"GARDEN GRAPPLE"));
box.append(h("div",{class:"sub"},"MIXED MARTIAL ARTS — POSITION MAP"));

if(loginState==="list"){
  if(users.length>0){
    const list=h("div",{class:"user-list"});
    users.forEach(u=>{
      const gameCount=Object.keys(u.myGame||{}).length;
      list.append(h("button",{class:"user-btn",onClick:()=>{loginTarget=u;loginState="pin";loginMode="login";pinError="";render()}},
        h("div",{class:"user-avatar"},initials(u.name)),
        h("div",{class:"user-info"},h("div",{class:"name"},u.name),h("div",{class:"meta"},gameCount+" techniques in my game"))
      ));
    });
    box.append(list);
  } else {
    box.append(h("div",{style:{color:"var(--text3)",fontSize:"13px",marginBottom:"16px"}},"No users yet. Create your profile to get started."));
  }
  box.append(h("button",{style:{width:"100%",padding:"10px",fontSize:"14px"},onClick:()=>{loginState="create";pinError="";render()}},"+ Create new user"));
  box.append(h("div",{style:{marginTop:"24px",paddingTop:"16px",borderTop:"1px solid var(--border)"}}));
  const adminRow=h("div",{style:{display:"flex",gap:"8px"}});
  adminRow.append(h("button",{style:{flex:1,fontSize:"11px"},onClick:()=>{loginState="admin-pin";loginMode="admin-login";pinError="";render()}},"Admin login"));
  box.append(adminRow);

} else if(loginState==="create"){
  box.append(h("h2",null,"Create your profile"));
  const nameI=h("input",{placeholder:"Your name",style:{marginBottom:"8px"}});
  box.append(nameI);
  box.append(h("div",{style:{fontSize:"12px",color:"var(--text3)",marginBottom:"8px"}},"Choose a 4-digit PIN"));
  const pins=makePinInputs();
  box.append(pins.wrap);
  if(pinError)box.append(h("div",{class:"pin-error"},pinError));
  box.append(h("div",{class:"form-actions",style:{marginTop:"12px",justifyContent:"center"}},
    h("button",{style:{padding:"8px 24px",fontSize:"14px"},onClick:()=>{
      const name=nameI.value.trim();const pin=pins.getValue();
      if(!name){pinError="Enter your name";render();return}
      if(pin.length!==4){pinError="Enter a 4-digit PIN";render();return}
      if(users.find(u=>u.name.toLowerCase()===name.toLowerCase())){pinError="Name already taken";render();return}
      const u={name,pin,myGame:{},filterCtx:"all"};
      users.push(u);saveUsers();curUser=u;ss(CUR_USER_KEY,u.name);
      loginState="list";path=[];isAdmin=false;render();
    }},"Create"),
    h("button",{style:{padding:"8px 16px"},onClick:()=>{loginState="list";pinError="";render()}},"Back")
  ));
  setTimeout(()=>nameI.focus(),50);

} else if(loginState==="pin"){
  box.append(h("h2",null,"Welcome back, "+loginTarget.name));
  box.append(h("div",{style:{fontSize:"12px",color:"var(--text3)",marginBottom:"8px"}},"Enter your PIN"));
  const pins=makePinInputs();
  box.append(pins.wrap);
  if(pinError)box.append(h("div",{class:"pin-error"},pinError));
  pins.onComplete=pin=>{
    if(pin===loginTarget.pin){curUser=loginTarget;ss(CUR_USER_KEY,curUser.name);filterCtx=curUser.filterCtx||"all";loginState="list";path=[];isAdmin=false;render()}
    else{pinError="Wrong PIN";render()}
  };
  box.append(h("div",{class:"form-actions",style:{marginTop:"12px",justifyContent:"center"}},
    h("button",{style:{padding:"8px 16px"},onClick:()=>{loginState="list";pinError="";render()}},"Back")
  ));

} else if(loginState==="admin-pin"){
  box.append(h("h2",null,"Admin login"));
  box.append(h("div",{style:{fontSize:"12px",color:"var(--text3)",marginBottom:"8px"}},"Enter admin PIN"));
  const pins=makePinInputs();
  box.append(pins.wrap);
  if(pinError)box.append(h("div",{class:"pin-error"},pinError));
  pins.onComplete=pin=>{
    const adminPin=ls(ADMIN_PIN_KEY)||"0000";
    if(pin===adminPin){curUser={name:"Admin",myGame:{},filterCtx:"all"};isAdmin=true;loginState="list";path=[];render()}
    else{pinError="Wrong admin PIN";render()}
  };
  box.append(h("div",{class:"form-actions",style:{marginTop:"12px",justifyContent:"center"}},
    h("button",{style:{padding:"8px 16px"},onClick:()=>{loginState="list";pinError="";render()}},"Back")
  ));
}
wrap.append(box);return wrap;
}

function makePinInputs(){
const wrap=h("div",{class:"pin-input"});const inputs=[];let cb=null;
for(let i=0;i<4;i++){
  const inp=h("input",{class:"pin-digit",type:"tel",maxLength:"1",inputMode:"numeric",pattern:"[0-9]*"});
  inp.addEventListener("input",e=>{inp.value=inp.value.replace(/\D/g,"").slice(0,1);if(inp.value&&i<3)inputs[i+1].focus();const full=inputs.map(x=>x.value).join("");if(full.length===4&&cb)setTimeout(()=>cb(full),100)});
  inp.addEventListener("keydown",e=>{if(e.key==="Backspace"&&!inp.value&&i>0){inputs[i-1].focus();inputs[i-1].value=""}});
  inputs.push(inp);wrap.append(inp);
}
setTimeout(()=>inputs[0].focus(),50);
const obj={wrap,getValue:()=>inputs.map(x=>x.value).join("")};
Object.defineProperty(obj,"onComplete",{set:fn=>{cb=fn}});return obj;
}

function renderHeader(){
return h("div",{class:"header"},
  renderLogoSVG(42),
  h("div",{class:"header-text"},h("h1",null,"GARDEN GRAPPLE"),h("div",{class:"sub"},"MIXED MARTIAL ARTS — POSITION MAP")),
  h("div",{class:"header-right"},
    h("div",{class:"ctx-btns"},
      ...["all","gi","nogi"].map(c=>h("button",{class:"ctx-btn"+(filterCtx===c?" active-"+c:""),onClick:()=>{filterCtx=c;if(curUser&&!isAdmin){curUser.filterCtx=c;saveUsers()}editing=null;adding=null;render()}},c==="all"?"All":c==="gi"?"Gi":"No-gi"))
    ),
    h("button",{class:"user-pill",onClick:()=>{curUser=null;isAdmin=false;loginState="list";path=[];localStorage.removeItem(CUR_USER_KEY);render()}},
      isAdmin?"Admin":curUser.name," ✕")
  )
);
}

function renderAdminBar(){
const bar=h("div",{class:"admin-bar"});
bar.append(h("span",{class:"badge"},"ADMIN"));
bar.append(h("span",null,"Master data"));
bar.append(h("button",{style:{fontSize:"11px"},onClick:()=>dlJSON(data,"garden-grapple-master.json")},"Export master"));
bar.append(h("button",{style:{fontSize:"11px"},onClick:()=>readJSON(d=>{if(d.groups){data=d;saveMaster();path=[];render();alert("Master data imported — "+countTech()+" techniques loaded")}else alert("Invalid: missing groups")})},"Import master"));
bar.append(h("span",{style:{color:"var(--border)"}},"│"));
bar.append(h("span",null,"Users"));
bar.append(h("button",{style:{fontSize:"11px"},onClick:()=>{const exp=users.map(u=>({name:u.name,myGame:u.myGame,filterCtx:u.filterCtx}));dlJSON(exp,"garden-grapple-users.json")}},"Export users"));
bar.append(h("button",{style:{fontSize:"11px"},onClick:()=>readJSON(d=>{if(Array.isArray(d)){d.forEach(imp=>{const existing=users.find(u=>u.name===imp.name);if(existing){Object.assign(existing.myGame,imp.myGame||{});existing.filterCtx=imp.filterCtx||existing.filterCtx}else{users.push({name:imp.name,pin:"0000",myGame:imp.myGame||{},filterCtx:imp.filterCtx||"all"})}});saveUsers();alert(d.length+" user profiles imported");render()}else alert("Invalid user data")})},"Import users"));
bar.append(h("span",{style:{color:"var(--border)"}},"│"));
bar.append(h("button",{style:{fontSize:"11px"},onClick:()=>{const np=prompt("New admin PIN (4 digits):");if(np&&/^\d{4}$/.test(np)){ss(ADMIN_PIN_KEY,np);alert("Admin PIN updated")}else if(np)alert("Must be 4 digits")}},"Change PIN"));
bar.append(h("button",{class:"del-btn",style:{fontSize:"11px"},onClick:()=>{if(confirm("Reset master data to defaults? User profiles will be kept.")){data=JSON.parse(JSON.stringify(DEFAULT_DATA));saveMaster();path=[];render()}}},"Reset master"));
bar.append(h("button",{class:"del-btn",style:{fontSize:"11px"},onClick:()=>{if(confirm("Delete ALL user profiles?")){users=[];saveUsers();alert("All users deleted")}}},"Clear users"));
return bar;
}

function countTech(){let n=0;data.groups.forEach(g=>g.positions.forEach(p=>Object.values(p.actions).forEach(a=>n+=a.length)));return n}

function renderToolbar(pm){
const tb=h("div",{class:"toolbar"});
if(path.length>0)tb.append(h("button",{onClick:()=>{path=path.slice(0,-1);editing=null;adding=null;render()}},"← Back"));
if(path.length>0){
  const bc=h("div",{class:"breadcrumb"});
  bc.append(h("span",{class:"link",onClick:()=>{path=[];render()}},"All"));
  if(path[0]){const g=data.groups.find(x=>x.id===path[0]);if(g){bc.append(h("span",null," › "));bc.append(h("span",{class:path.length===1?"current":"link",onClick:()=>{path=[path[0]];render()}},g.name))}}
  if(path[1]){const n=pm[path[1]];if(n){bc.append(h("span",null," › "));bc.append(h("span",{class:"current"},n))}}
  tb.append(bc);
}
tb.append(h("div",{class:"spacer"}));
if(!isAdmin&&curUser)tb.append(h("button",{class:"mygame-btn"+(filterMyGame?" active":""),onClick:()=>{filterMyGame=!filterMyGame;render()}},filterMyGame?"★ My game":"☆ My game"));
return tb;
}

function renderGroups(){
const wrap=h("div",null);
data.groups.forEach(g=>{
  const total=g.positions.reduce((s,p)=>s+Object.values(p.actions).reduce((s2,arr)=>s2+arr.filter(ctxMatch).length,0),0);
  wrap.append(h("button",{class:"group-card",style:{borderLeftColor:g.color},onClick:()=>{path=[g.id];render()}},
    h("h3",null,g.name),h("div",{class:"meta"},g.positions.length+" positions · "+total+" techniques")));
});
return wrap;
}

function renderPositions(group,pm){
const wrap=h("div",null);
const grid=h("div",{class:"pos-grid"});
group.positions.forEach(p=>{
  const cats=CATS.filter(c=>p.actions[c]?.filter(ctxMatch).length>0);
  const total=cats.reduce((s,c)=>s+p.actions[c].filter(ctxMatch).length,0);
  const goTos=cats.reduce((s,c)=>s+p.actions[c].filter(x=>x.priority===1&&ctxMatch(x)).length,0);
  const myCount=curUser&&!isAdmin?cats.reduce((s,c)=>s+p.actions[c].filter(x=>ctxMatch(x)&&isMyGame(x.id)).length,0):0;
  if(filterMyGame&&myCount===0)return;
  grid.append(h("button",{class:"pos-card",style:{borderLeftColor:group.color},onClick:()=>{path=[group.id,p.id];editing=null;adding=null;filterP=null;render()}},
    h("h4",null,p.name),
    h("div",{class:"meta"},total+" options"+(goTos?" · "+goTos+" go-to":"")+(myCount?" · ★"+myCount:"")),
    h("div",{class:"tags"},...cats.map(c=>{const m=CATMETA[c];return h("span",{class:"tag",style:{background:m.bg,color:m.t}},m.l+": "+p.actions[c].filter(ctxMatch).length)}))
  ));
});
wrap.append(grid);
if(isAdmin)wrap.append(h("button",{onClick:()=>{addingPos=group.id;render()}},"+ Add position"));
if(addingPos===group.id)wrap.append(renderAddPos(group.id));
return wrap;
}

function renderDetail(pos,pm){
const wrap=h("div",null);
const fb=h("div",{class:"filter-bar"});
[null,1,2,3].forEach(p=>{fb.append(h("button",{class:"filter-btn"+(filterP===p?" active":""),onClick:()=>{filterP=filterP===p?null:p;render()}},p===null?"All":PRIO[p]))});
if(!isAdmin&&curUser)fb.append(h("button",{class:"mygame-btn"+(filterMyGame?" active":""),style:{marginLeft:"8px"},onClick:()=>{filterMyGame=!filterMyGame;render()}},filterMyGame?"★ My game":"☆ My game"));
fb.append(h("div",{class:"spacer"}));
if(isAdmin)fb.append(h("button",{class:"del-btn",onClick:()=>{if(confirm("Delete this position?")){for(const g of data.groups)g.positions=g.positions.filter(x=>x.id!==pos.id);saveMaster();path=path.slice(0,1);render()}}},"Delete position"));
wrap.append(fb);

const activeCats=CATS.filter(c=>(pos.actions[c]?.filter(ctxMatch).length>0)||c==="submissions"||c==="transitions"||c==="risks");
activeCats.forEach(cat=>{
  const m=CATMETA[cat];if(!m)return;
  const allItems=pos.actions[cat]||[];
  const items=allItems.filter(ctxMatch);
  let filtered=filterP?items.filter(i=>i.priority===filterP):items;
  if(filterMyGame)filtered=filtered.filter(item=>isMyGame(item.id));

  const sec=h("div",{class:"cat-section"});
  sec.append(h("div",{class:"cat-header"},
    h("div",{class:"cat-icon",style:{background:m.bg,color:m.t}},m.i),
    h("span",{class:"cat-title"},m.l),
    h("span",{class:"cat-count"},"("+filtered.length+")"),
    h("div",{class:"spacer"}),
    isAdmin?h("button",{onClick:()=>{adding=adding===cat?null:cat;editing=null;render()}},"+ Add"):null
  ));

  if(filtered.length===0)sec.append(h("div",{class:"empty"},filterMyGame?"No techniques in your game here":items.length?"None at this priority":allItems.length?"Hidden by ruleset filter":"None yet"));

  filtered.forEach(item=>{
    const realIdx=allItems.indexOf(item);
    if(isAdmin&&editing&&editing.cat===cat&&editing.idx===realIdx){
      sec.append(renderItemForm(item,m,pm,pos.id,cat,(u)=>{Object.assign(allItems[realIdx],u);if(!allItems[realIdx].id)allItems[realIdx].id=genTechId(pos.id,cat,u.name);saveMaster();editing=null;render()},()=>{editing=null;render()}));
      return;
    }
    const dest=item.leadsTo;const destName=dest==="finish"?"Finish":(pm[dest]||dest);const ctx=item.ctx||"both";
    const starred=isMyGame(item.id);
    sec.append(h("div",{class:"item",style:{borderLeftColor:m.c}},
      h("div",{class:"item-body"},
        h("div",{class:"item-row"},
          h("span",{class:"item-name"},item.name),
          h("span",{class:"priority-tag",style:{background:item.priority===1?m.bg:"var(--bg2)",color:item.priority===1?m.t:"var(--text3)"}},PRIO[item.priority]),
          ctx!=="both"?h("span",{class:"ctx-tag",style:{background:CTX_C[ctx].bg,color:CTX_C[ctx].t}},ctx==="gi"?"Gi":"No-gi"):null,
          dest&&dest!=="finish"?h("span",{class:"dest-tag",style:{color:m.t,background:m.bg},onClick:()=>{for(const g of data.groups){const p=g.positions.find(x=>x.id===dest);if(p){path=[g.id,dest];editing=null;adding=null;filterP=null;render();return}}}},"→ "+destName):null,
          dest==="finish"?h("span",{class:"dest-finish",style:{color:"#712B13",background:"#FAECE7"}},"→ Finish"):null
        ),
        item.notes?h("div",{class:"item-notes"},item.notes):null
      ),
      h("div",{class:"item-actions"},
        !isAdmin&&curUser?h("button",{class:"star-btn"+(starred?" active":""),onClick:()=>toggleMyGame(item.id)},starred?"★":"☆"):null,
        isAdmin?h("button",{style:{fontSize:"11px",padding:"2px 6px"},onClick:()=>{editing={cat,idx:realIdx};adding=null;render()}},"Edit"):null,
        isAdmin?h("button",{class:"del-btn",style:{fontSize:"11px",padding:"2px 6px"},onClick:()=>{allItems.splice(realIdx,1);saveMaster();render()}},"×"):null
      )
    ));
  });

  if(isAdmin&&adding===cat)sec.append(renderItemForm(null,m,pm,pos.id,cat,(item)=>{if(!pos.actions[cat])pos.actions[cat]=[];item.id=genTechId(pos.id,cat,item.name);pos.actions[cat].push(item);saveMaster();adding=null;render()},()=>{adding=null;render()},true));
  wrap.append(sec);
});

if(isAdmin){
  const inactiveCats=CATS.filter(c=>!activeCats.includes(c)&&CATMETA[c]);
  if(inactiveCats.length){
    const addC=h("div",{class:"add-cats"},h("span",null,"Add category: "));
    inactiveCats.forEach(c=>{addC.append(h("button",{onClick:()=>{adding=c;render()}},"+ "+CATMETA[c].l))});
    wrap.append(addC);
  }
}
return wrap;
}

function renderItemForm(item,meta,pm,posId,cat,onSave,onCancel,isNew){
const box=h("div",{class:"form-box",style:{borderColor:meta.c}});
const nameI=h("input",{value:item?.name||"",placeholder:"Technique name"});
const notesI=h("input",{value:item?.notes||"",placeholder:"Notes / cues"});
const prioS=h("select",null,h("option",{value:"1"},"Go-to"),h("option",{value:"2"},"Secondary"),h("option",{value:"3"},"Situational"));
prioS.value=String(item?.priority||2);prioS.style.width="110px";
const ctxS=h("select",null,h("option",{value:"both"},"Both"),h("option",{value:"gi"},"Gi only"),h("option",{value:"nogi"},"No-gi only"));
ctxS.value=item?.ctx||"both";ctxS.style.width="100px";
const destS=h("select",null,h("option",{value:""},"— none —"),h("option",{value:"finish"},"Finish (submission)"));
Object.entries(pm).sort((a,b)=>a[1].localeCompare(b[1])).forEach(([id,n])=>{destS.append(h("option",{value:id},n))});
destS.value=item?.leadsTo||"";destS.style.flex="1 1 160px";
box.append(h("div",{class:"form-row"},nameI,prioS,ctxS));
box.append(notesI);
box.append(h("div",{class:"form-row",style:{alignItems:"center"}},h("span",{style:{fontSize:"12px",color:"var(--text2)"}},"Leads to:"),destS));
if(item?.id)box.append(h("div",{style:{fontSize:"10px",color:"var(--text3)",marginBottom:"8px"}},"ID: "+item.id));
box.append(h("div",{class:"form-actions"},
  h("button",{onClick:()=>{const n=nameI.value.trim();if(!n)return;onSave({name:n,notes:notesI.value.trim(),priority:+prioS.value,leadsTo:destS.value||undefined,ctx:ctxS.value,id:item?.id})}},isNew?"Add":"Save"),
  h("button",{onClick:onCancel},"Cancel")
));
setTimeout(()=>nameI.focus(),0);return box;
}

function renderAddPos(groupId){
const box=h("div",{class:"form-box"});
const nameI=h("input",{placeholder:"Position name"});
box.append(h("div",{style:{fontWeight:"500",fontSize:"14px",marginBottom:"12px"}},"New position"));
box.append(nameI);
box.append(h("div",{class:"form-actions",style:{marginTop:"8px"}},
  h("button",{onClick:()=>{const n=nameI.value.trim();if(!n)return;const g=data.groups.find(x=>x.id===groupId);if(g){const id=n.toLowerCase().replace(/[^a-z0-9]+/g,"-");g.positions.push({id,name:n,actions:{submissions:[],sweeps:[],transitions:[],risks:[]}});saveMaster();addingPos=null;path=[groupId,id];render()}}},"Add"),
  h("button",{onClick:()=>{addingPos=null;render()}},"Cancel")
));
setTimeout(()=>nameI.focus(),0);return box;
}
