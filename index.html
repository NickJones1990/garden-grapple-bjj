<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0"/>
<title>AND Network — Defect Tracker</title>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-storage-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<style>
:root{--dg:#215D5E;--mg:#00B48A;--lg:#EEF6E8;--gray:#666;--lgray:#D1D3D4;--r:8px;--sh:0 2px 8px rgba(33,93,94,.12);--shl:0 12px 40px rgba(33,93,94,.2);}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Segoe UI',Tahoma,sans-serif;background:#f0f4f3;color:#111;min-height:100vh;}
#root{min-height:100vh;display:flex;flex-direction:column;}
.login-page{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--dg);background-image:radial-gradient(circle at 15% 50%,rgba(0,180,138,.2) 0%,transparent 55%),radial-gradient(circle at 85% 20%,rgba(238,246,232,.1) 0%,transparent 50%);padding:24px;}
.login-card{background:#fff;border-radius:20px;padding:44px 36px;width:100%;max-width:400px;box-shadow:0 24px 64px rgba(0,0,0,.3);}
.login-logo{display:block;height:72px;width:auto;margin:0 auto 24px;border-radius:10px;}
.login-title{font-size:20px;font-weight:700;color:var(--dg);text-align:center;margin-bottom:4px;}
.login-sub{font-size:13px;color:var(--gray);text-align:center;margin-bottom:28px;}
.login-err{background:#FFCCCC;color:#7B0000;border-radius:8px;padding:10px 14px;font-size:13px;margin-bottom:14px;text-align:center;}
.login-footer{margin-top:24px;font-size:11px;color:var(--lgray);text-align:center;}
.hdr{background:var(--dg);color:#fff;padding:0 14px;height:56px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.25);}
.hdr-logo-img{height:32px;width:auto;object-fit:contain;flex-shrink:0;}
.hdr-title{font-size:14px;font-weight:600;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.hdr-badge{font-size:10px;font-weight:700;padding:3px 9px;border-radius:20px;flex-shrink:0;text-transform:uppercase;letter-spacing:.04em;cursor:pointer;border:none;display:flex;align-items:center;gap:4px;}
.badge-admin{background:#FFD700;color:#333;}
.badge-standard{background:var(--mg);color:#fff;}
.badge-client{background:#4A90A4;color:#fff;}
.badge-contractor{background:#9B59B6;color:#fff;}
.btn-hdr{background:rgba(255,255,255,.14);border:none;color:#fff;cursor:pointer;padding:5px 11px;border-radius:6px;font-size:13px;display:flex;align-items:center;gap:4px;flex-shrink:0;}
.btn-hdr:hover{background:rgba(255,255,255,.25);}
.btn{display:inline-flex;align-items:center;gap:6px;padding:9px 16px;border-radius:var(--r);font-family:inherit;font-size:14px;font-weight:600;cursor:pointer;border:none;transition:all .15s;}
.btn:disabled{opacity:.45;cursor:not-allowed;}
.btn-primary{background:var(--mg);color:#fff;}.btn-primary:hover:not(:disabled){background:#009e7a;}
.btn-secondary{background:#fff;color:var(--dg);border:1.5px solid var(--lgray);}.btn-secondary:hover:not(:disabled){border-color:var(--mg);color:var(--mg);}
.btn-danger{background:#dc3545;color:#fff;}.btn-danger:hover:not(:disabled){background:#c82333;}
.btn-warn{background:#FF6B00;color:#fff;}.btn-warn:hover:not(:disabled){background:#e05a00;}
.btn-verify{background:#215D5E;color:#fff;}.btn-verify:hover:not(:disabled){background:#1a4a4b;}
.btn-sm{padding:5px 10px;font-size:12px;}
.btn-icon{background:none;border:none;cursor:pointer;padding:6px;border-radius:6px;color:var(--gray);display:flex;align-items:center;font-size:15px;}
.btn-icon:hover{background:var(--lg);}
.fg{margin-bottom:14px;}
.fl{display:block;font-size:11px;font-weight:700;color:var(--dg);margin-bottom:5px;text-transform:uppercase;letter-spacing:.05em;}
.req{color:#dc3545;margin-left:2px;}
.fi,.fs,.fta{width:100%;padding:10px 12px;border:1.5px solid var(--lgray);border-radius:8px;font-family:inherit;font-size:14px;color:#111;background:#fff;transition:border-color .15s;}
.fi:focus,.fs:focus,.fta:focus{outline:none;border-color:var(--mg);box-shadow:0 0 0 3px rgba(0,180,138,.1);}
.fta{min-height:76px;resize:vertical;}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.faction{display:flex;gap:9px;margin-top:20px;padding-top:14px;border-top:1px solid var(--lg);}
.card{background:#fff;border-radius:var(--r);box-shadow:var(--sh);padding:16px;}.card+.card{margin-top:10px;}
.page{flex:1;padding:14px;max-width:900px;width:100%;margin:0 auto;}
.admin-tabs{display:flex;border-bottom:2px solid var(--lg);background:#fff;position:sticky;top:56px;z-index:90;}
.admin-tab{flex:1;padding:13px;text-align:center;font-size:13px;font-weight:600;cursor:pointer;color:var(--gray);border-bottom:2px solid transparent;margin-bottom:-2px;transition:all .15s;}
.admin-tab.active{color:var(--dg);border-bottom-color:var(--mg);}
.admin-body{padding:14px;max-width:900px;margin:0 auto;}
.admin-section-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;}
.sec-title{font-size:17px;font-weight:700;color:var(--dg);}
.data-table{width:100%;border-collapse:collapse;background:#fff;border-radius:8px;overflow:hidden;box-shadow:var(--sh);}
.data-table th{background:var(--dg);color:#fff;padding:10px 12px;font-size:11px;font-weight:700;text-align:left;white-space:nowrap;text-transform:uppercase;letter-spacing:.04em;}
.data-table td{padding:10px 12px;font-size:13px;border-bottom:1px solid var(--lg);vertical-align:middle;}
.data-table tr:last-child td{border-bottom:none;}
.data-table tr:hover td{background:#f8fffe;}
.role-badge{display:inline-flex;align-items:center;padding:3px 9px;border-radius:12px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;}
.rb-admin{background:#FFF8CC;color:#7A6000;}.rb-standard{background:var(--lg);color:var(--dg);}.rb-client{background:#EBF5FB;color:#2C6E87;}.rb-contractor{background:#F3E8FF;color:#6B21A8;}
.proj-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;}
.proj-card{display:flex;align-items:center;gap:12px;padding:13px 15px;border-left:4px solid var(--mg);transition:all .15s;}
.proj-card:hover{background:var(--lg);}
.proj-icon{width:38px;height:38px;background:var(--lg);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;cursor:pointer;}
.proj-info{flex:1;min-width:0;cursor:pointer;}
.proj-name{font-weight:600;font-size:14px;color:var(--dg);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.proj-meta{font-size:11px;color:var(--gray);margin-top:2px;}
.client-chip{display:inline-flex;align-items:center;background:var(--lg);color:var(--dg);border-radius:4px;padding:2px 7px;font-size:11px;font-weight:600;margin-top:3px;}
.empty{text-align:center;padding:48px 24px;color:var(--gray);}
.empty-icon{font-size:44px;margin-bottom:10px;}
.empty-title{font-size:15px;font-weight:600;color:var(--dg);margin-bottom:6px;}
.capture-tabs{display:flex;border-bottom:2px solid var(--lg);background:#fff;position:sticky;top:56px;z-index:90;}
.capture-tab{flex:1;padding:12px;text-align:center;font-size:13px;font-weight:600;cursor:pointer;color:var(--gray);border-bottom:2px solid transparent;margin-bottom:-2px;transition:all .15s;display:flex;align-items:center;justify-content:center;gap:6px;}
.capture-tab.active{color:var(--dg);border-bottom-color:var(--mg);}
.tab-pill{background:var(--mg);color:#fff;border-radius:10px;padding:1px 6px;font-size:10px;}
.tab-pill-warn{background:#FFCCCC;color:#7B0000;border-radius:10px;padding:1px 6px;font-size:10px;}
.tab-pill-rectified{background:#9B59B6;color:#fff;border-radius:10px;padding:1px 6px;font-size:10px;}
.recent-list{padding:12px 14px;}
.recent-item{display:flex;align-items:center;gap:10px;padding:10px 8px;cursor:pointer;border-bottom:1px solid var(--lg);border-radius:6px;transition:background .15s;}
.recent-item:hover{background:var(--lg);}
.recent-thumb{width:42px;height:42px;border-radius:6px;object-fit:cover;border:1px solid var(--lgray);flex-shrink:0;}
.recent-no-thumb{width:42px;height:42px;border-radius:6px;background:var(--lg);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;}
.recent-info{flex:1;min-width:0;}
.recent-id{font-size:11px;font-weight:700;color:var(--dg);}
.recent-desc{font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.recent-meta{font-size:11px;color:var(--gray);}
.fab{position:fixed;bottom:22px;right:22px;width:58px;height:58px;border-radius:50%;background:var(--mg);color:#fff;border:none;cursor:pointer;font-size:30px;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 20px rgba(0,180,138,.45);transition:all .2s;z-index:200;}
.fab:hover{background:#009e7a;transform:scale(1.07);}
.reg-header{background:#fff;padding:11px 14px;border-bottom:2px solid var(--lg);position:sticky;top:56px;z-index:90;}
.reg-meta{font-size:11px;color:var(--gray);margin-bottom:8px;}
.filters{display:flex;gap:7px;flex-wrap:wrap;align-items:center;}
.fsel{padding:6px 9px;border:1.5px solid var(--lgray);border-radius:6px;font-family:inherit;font-size:12px;color:var(--dg);background:#fff;cursor:pointer;}
.fsel:focus{outline:none;border-color:var(--mg);}
.fsel.on{border-color:var(--mg);background:var(--lg);font-weight:600;}
.finput{padding:6px 9px;border:1.5px solid var(--lgray);border-radius:6px;font-family:inherit;font-size:12px;background:#fff;width:130px;}
.finput:focus{outline:none;border-color:var(--mg);}
.reg-body{padding:12px 14px;}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:12px;}
.stat{background:#fff;border-radius:8px;padding:10px;text-align:center;border-left:3px solid var(--mg);box-shadow:var(--sh);}
.stat-n{font-size:22px;font-weight:700;color:var(--dg);}
.stat-l{font-size:11px;color:var(--gray);margin-top:2px;}
.def-table{width:100%;border-collapse:collapse;background:#fff;border-radius:8px;overflow:hidden;box-shadow:var(--sh);}
.def-table th{background:var(--dg);color:#fff;padding:9px 11px;font-size:11px;font-weight:600;text-align:left;white-space:nowrap;}
.def-table td{padding:9px 11px;font-size:12px;border-bottom:1px solid var(--lg);vertical-align:middle;}
.def-table tr:hover td{background:#f8fffe;cursor:pointer;}
.def-table tr:last-child td{border-bottom:none;}
.def-id{font-weight:700;color:var(--dg);font-size:11px;}
.def-desc{max-width:200px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.thumb{width:34px;height:34px;object-fit:cover;border-radius:4px;border:1px solid var(--lgray);}
.no-thumb{width:34px;height:34px;background:var(--lg);border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:14px;color:var(--gray);}
.badge{display:inline-flex;align-items:center;padding:2px 7px;border-radius:12px;font-size:11px;font-weight:600;white-space:nowrap;}
.b-minor{background:#FFF3CD;color:#856404;}.b-major{background:#FFE0CC;color:#7B3500;}.b-critical{background:#FFCCCC;color:#7B0000;}
.b-open{background:#FFCCCC;color:#7B0000;}.b-prog{background:#FFF3CD;color:#856404;}.b-closed{background:#D4EDDA;color:#155724;}.b-disputed{background:#E2D9F3;color:#4A1A7B;}.b-rectified{background:#EDE9FE;color:#5B21B6;}
.tag-chip{display:inline-flex;align-items:center;padding:2px 7px;border-radius:10px;font-size:10px;font-weight:600;background:#E0F2FE;color:#0369A1;margin:1px;}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:300;display:flex;align-items:flex-end;}
.overlay.center{align-items:center;justify-content:center;}
.modal{background:#fff;border-radius:16px 16px 0 0;width:100%;max-height:93vh;overflow-y:auto;padding:20px;}
.modal.ctr{border-radius:16px;max-width:520px;width:100%;margin:16px;max-height:88vh;}
.modal.wide{border-radius:16px;max-width:700px;width:100%;margin:16px;max-height:90vh;}
.mhdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px;padding-bottom:12px;border-bottom:2px solid var(--lg);}
.mtitle{font-size:16px;font-weight:700;color:var(--dg);}
.mclose{background:none;border:none;font-size:22px;cursor:pointer;color:var(--gray);line-height:1;}
.photo-upload{border:2px dashed var(--lgray);border-radius:8px;padding:18px;text-align:center;cursor:pointer;transition:all .2s;}
.photo-upload:hover{border-color:var(--mg);background:var(--lg);}
.photo-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin-top:9px;}
.photo-item{position:relative;aspect-ratio:1;}
.photo-item img{width:100%;height:100%;object-fit:cover;border-radius:6px;border:1px solid var(--lgray);}
.photo-rm{position:absolute;top:3px;right:3px;background:rgba(0,0,0,.6);color:#fff;border:none;border-radius:50%;width:20px;height:20px;cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center;}
.photo-ann{position:absolute;bottom:3px;left:50%;transform:translateX(-50%);background:rgba(33,93,94,.85);color:#fff;border:none;border-radius:4px;font-size:9px;font-weight:600;cursor:pointer;padding:2px 7px;white-space:nowrap;}
.ann-overlay{position:fixed;inset:0;background:#000;z-index:500;display:flex;flex-direction:column;}
.ann-toolbar{background:var(--dg);padding:9px 14px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.ann-wrap{flex:1;overflow:auto;display:flex;align-items:center;justify-content:center;padding:6px;}
canvas.ann-canvas{max-width:100%;max-height:100%;cursor:crosshair;touch-action:none;}
.color-btn{width:26px;height:26px;border-radius:50%;border:2px solid rgba(255,255,255,.3);cursor:pointer;flex-shrink:0;}
.color-btn.on{border-color:#fff;transform:scale(1.2);}
.tool-btn{background:rgba(255,255,255,.15);color:#fff;border:none;border-radius:4px;cursor:pointer;padding:4px 8px;font-size:12px;}
.tool-btn.on{background:var(--mg);}
.dtl-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px;}
.dlbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--gray);margin-bottom:3px;}
.dval{font-size:13px;color:#111;}
.dtl-photos{display:grid;grid-template-columns:repeat(2,1fr);gap:7px;}
.dtl-photos img{width:100%;border-radius:7px;border:1px solid var(--lgray);cursor:pointer;}
.status-sel{padding:5px 9px;border:1.5px solid var(--lgray);border-radius:6px;font-family:inherit;font-size:12px;font-weight:600;cursor:pointer;background:#fff;}
.tag-area{display:flex;flex-wrap:wrap;gap:5px;padding:7px;border:1.5px solid var(--lgray);border-radius:6px;min-height:42px;cursor:text;}
.tag{background:var(--lg);color:var(--dg);border-radius:4px;padding:2px 7px;font-size:11px;font-weight:600;display:flex;align-items:center;gap:3px;}
.tag button{background:none;border:none;cursor:pointer;color:var(--gray);font-size:13px;line-height:1;}
.tag-input{border:none;outline:none;font-family:inherit;font-size:12px;flex:1;min-width:70px;}
.tag-select-chip{display:inline-flex;align-items:center;padding:4px 10px;border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;border:1.5px solid var(--lgray);background:#fff;color:var(--gray);transition:all .15s;margin:2px;}
.tag-select-chip.selected{background:#E0F2FE;color:#0369A1;border-color:#0369A1;}
.tag-select-chip:hover{border-color:var(--mg);}
.closure-panel{background:var(--lg);border-radius:10px;padding:14px;margin-bottom:14px;border-left:4px solid var(--mg);}
.closure-panel-hdr{font-size:12px;font-weight:700;color:var(--dg);text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px;display:flex;align-items:center;gap:6px;}
.closure-evidence{display:grid;grid-template-columns:repeat(2,1fr);gap:7px;margin-top:8px;}
.closure-evidence img{width:100%;border-radius:6px;border:1px solid var(--lgray);cursor:pointer;}
.close-defect-btn{width:100%;padding:12px;background:var(--dg);color:#fff;border:none;border-radius:8px;font-family:inherit;font-size:14px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;margin-top:10px;transition:background .15s;}
.close-defect-btn:hover{background:#1a4a4b;}
.rectified-panel{background:#F3E8FF;border-radius:10px;padding:14px;margin-bottom:14px;border-left:4px solid #9B59B6;}
.rectified-panel-hdr{font-size:12px;font-weight:700;color:#6B21A8;text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px;}
.verify-actions{display:flex;gap:8px;margin-top:12px;}
.activity-log{max-height:300px;overflow-y:auto;border:1px solid var(--lgray);border-radius:8px;}
.activity-item{display:flex;gap:10px;padding:10px 12px;border-bottom:1px solid var(--lg);font-size:12px;}
.activity-item:last-child{border-bottom:none;}
.activity-dot{width:8px;height:8px;border-radius:50%;background:var(--mg);margin-top:4px;flex-shrink:0;}
.activity-dot.red{background:#dc3545;}.activity-dot.purple{background:#9B59B6;}.activity-dot.blue{background:#4A90A4;}.activity-dot.amber{background:#FF6B00;}
.lightbox{position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:600;display:flex;align-items:center;justify-content:center;padding:20px;}
.lightbox img{max-width:100%;max-height:90vh;border-radius:8px;}
.lb-close{position:absolute;top:14px;right:14px;background:rgba(255,255,255,.15);color:#fff;border:none;border-radius:50%;width:38px;height:38px;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.toast{position:fixed;top:68px;left:50%;transform:translateX(-50%);background:var(--dg);color:#fff;padding:10px 20px;border-radius:8px;font-size:13px;font-weight:600;z-index:1000;box-shadow:var(--shl);animation:fi .2s;white-space:nowrap;}
@keyframes fi{from{opacity:0;transform:translateX(-50%) translateY(-8px);}to{opacity:1;transform:translateX(-50%) translateY(0);}}
.spinner{display:inline-block;width:16px;height:16px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.prog-bar{height:3px;background:var(--lg);border-radius:2px;overflow:hidden;margin-top:6px;}
.prog-fill{height:100%;background:var(--mg);transition:width .3s;}
.divider{height:1px;background:var(--lg);margin:8px 0;}
.offline-banner{background:#FF6B00;color:#fff;text-align:center;padding:6px;font-size:12px;font-weight:600;position:sticky;top:56px;z-index:89;}
.loading-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--dg);flex-direction:column;gap:16px;}
.loading-screen img{height:64px;border-radius:8px;}
.loading-dots{display:flex;gap:6px;}
.loading-dots span{width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,.4);animation:dot 1.2s infinite;}
.loading-dots span:nth-child(2){animation-delay:.2s;}
.loading-dots span:nth-child(3){animation-delay:.4s;}
@keyframes dot{0%,80%,100%{transform:scale(.6);opacity:.4;}40%{transform:scale(1);opacity:1;}}
.contractor-portal-hdr{background:linear-gradient(135deg,#215D5E,#1a4a4b);color:#fff;padding:20px;margin-bottom:0;}
.contractor-hero{font-size:22px;font-weight:700;margin-bottom:4px;}
.contractor-sub{font-size:13px;opacity:.8;}
.defect-card{background:#fff;border-radius:10px;box-shadow:var(--sh);padding:14px;margin-bottom:10px;border-left:4px solid var(--lgray);cursor:pointer;transition:all .15s;}
.defect-card:hover{transform:translateY(-1px);box-shadow:0 4px 16px rgba(33,93,94,.15);}
.defect-card.status-rectified{border-left-color:#9B59B6;}
.defect-card.status-open{border-left-color:#dc3545;}
.defect-card.status-inprogress{border-left-color:#FF6B00;}
.defect-card.status-closed{border-left-color:#28a745;}
@media(max-width:600px){.stats{grid-template-columns:repeat(2,1fr);}.frow{grid-template-columns:1fr;}.dtl-grid{grid-template-columns:1fr;}.finput{width:100px;}.page{padding:10px;}.admin-body{padding:10px;}}

/* ── PDF REPORT ────────────────────────────────── */
async function generatePDF(proj,defects,clientName,logoGreenB64){
  const {jsPDF}=window.jspdf;
  const doc=new jsPDF({orientation:'portrait',unit:'mm',format:'a4'});
  const W=210,H=297;
  const DG=[33,93,94],MG=[0,180,138],LG=[238,246,232],GRAY=[102,102,102],LGRAY=[209,211,212];
  const total=defects.length;
  const open=defects.filter(d=>d.status==='Open').length;
  const closed=defects.filter(d=>d.status==='Closed').length;
  const critical=defects.filter(d=>d.severity==='Critical').length;
  const rectified=defects.filter(d=>d.status==='Rectified').length;
  const inProg=defects.filter(d=>d.status==='In Progress').length;
  const disputed=defects.filter(d=>d.status==='Disputed').length;

  // ── COVER PAGE ──────────────────────────────────────────
  doc.setFillColor(...DG);doc.rect(0,0,W,H,'F');
  // Top accent bar
  doc.setFillColor(...MG);doc.rect(0,0,8,H,'F');
  // Logo
  try{doc.addImage(logoGreenB64,'JPEG',20,22,36,24);}catch(e){}
  // Title block
  doc.setTextColor(255,255,255);
  doc.setFontSize(9);doc.setFont('helvetica','normal');
  doc.text('PROJECT DEFECT REPORT',20,68);
  doc.setFontSize(26);doc.setFont('helvetica','bold');
  const titleLines=doc.splitTextToSize(proj.name,160);
  doc.text(titleLines,20,80);
  const titleH=titleLines.length*10;
  if(clientName){doc.setFontSize(13);doc.setFont('helvetica','normal');doc.setTextColor(...MG);doc.text(clientName,20,80+titleH+6);}
  // Date
  doc.setFontSize(10);doc.setFont('helvetica','normal');doc.setTextColor(200,230,225);
  doc.text('Generated '+new Date().toLocaleDateString('en-AU',{day:'numeric',month:'long',year:'numeric'}),20,80+titleH+18);
  // Stat cards
  const cards=[['TOTAL',total,''],['OPEN',open,'#dc3545'],['CRITICAL',critical,'#FF6B00'],['CLOSED',closed,'']];
  const cy=H-80;
  cards.forEach((card,i)=>{
    const cx=20+i*46;
    doc.setFillColor(255,255,255);doc.setGState&&doc.setGState(new doc.GState({opacity:0.08}));
    doc.roundedRect(cx,cy,40,36,3,3,'F');
    doc.setGState&&doc.setGState(new doc.GState({opacity:1}));
    doc.setFillColor(255,255,255);doc.roundedRect(cx,cy,40,36,3,3,'S');
    doc.setTextColor(card[2]||255,card[2]?255:255,255);
    doc.setFontSize(22);doc.setFont('helvetica','bold');doc.text(String(card[1]),cx+20,cy+20,{align:'center'});
    doc.setFontSize(7);doc.setFont('helvetica','normal');doc.setTextColor(...MG);doc.text(card[0],cx+20,cy+30,{align:'center'});
  });
  // Footer
  doc.setTextColor(100,140,140);doc.setFontSize(8);
  doc.text('andnetwork.com.au · SOP-02 §3.21',W/2,H-10,{align:'center'});

  // ── PAGE 2 — CHARTS ─────────────────────────────────────
  doc.addPage();
  // Header strip
  doc.setFillColor(...DG);doc.rect(0,0,W,18,'F');
  doc.setFillColor(...MG);doc.rect(0,0,8,18,'F');
  doc.setTextColor(255,255,255);doc.setFontSize(10);doc.setFont('helvetica','bold');doc.text('DEFECT ANALYSIS',14,12);
  doc.setFontSize(8);doc.setFont('helvetica','normal');doc.setTextColor(...GRAY);doc.text(proj.name,14,24);

  // Draw charts using canvas
  const drawChart=async(type,data,labels,colors,cx,cy,cw,ch,title)=>{
    return new Promise(res=>{
      const canvas=document.createElement('canvas');
      canvas.width=cw*4;canvas.height=ch*4;
      const ctx=canvas.getContext('2d');
      ctx.scale(4,4);
      new Chart(ctx,{
        type,
        data:{labels,datasets:[{data,backgroundColor:colors,borderColor:type==='line'?colors[0]:'transparent',borderWidth:type==='line'?2:0,fill:false,tension:.3,pointRadius:3}]},
        options:{responsive:false,animation:false,plugins:{legend:{display:type==='doughnut',position:'right',labels:{font:{size:9},boxWidth:10,padding:6}},title:{display:!!title,text:title,font:{size:10,weight:'bold'},color:'#215D5E',padding:{bottom:8}}},scales:type!=='doughnut'?{x:{grid:{color:'rgba(0,0,0,.05)'},ticks:{font:{size:8},maxRotation:35}},y:{grid:{color:'rgba(0,0,0,.05)'},ticks:{font:{size:8},stepSize:1}}}:{}}
      });
      setTimeout(()=>{const img=canvas.toDataURL('image/png');doc.addImage(img,'PNG',cx,cy,cw,ch);res();},300);
    });
  };

  const statusColors=['#FFCCCC','#FFF3CD','#EDE9FE','#D4EDDA','#E2D9F3'];
  const sevColors=['#FFF3CD','#FFE0CC','#FFCCCC'];
  const contractorNames=[...new Set(defects.map(d=>d.contractor).filter(Boolean))].slice(0,8);
  const contractorCounts=contractorNames.map(c=>defects.filter(d=>d.contractor===c).length);
  const areaNames=[...new Set(defects.map(d=>d.area==='__other__'?(d.areaCustom||'Other'):d.area).filter(Boolean))].slice(0,8);
  const areaCounts=areaNames.map(a=>defects.filter(d=>(d.area==='__other__'?(d.areaCustom||'Other'):d.area)===a).length);

  // Chart 1: Status donut
  await drawChart('doughnut',[open,inProg,rectified,closed,disputed],['Open','In Progress','Rectified','Closed','Disputed'],['#F87171','#FCD34D','#C084FC','#86EFAC','#A78BFA'],14,30,80,70,'Status Breakdown');
  // Chart 2: Severity bar
  await drawChart('bar',[defects.filter(d=>d.severity==='Minor').length,defects.filter(d=>d.severity==='Major').length,critical],['Minor','Major','Critical'],sevColors,105,30,90,70,'By Severity');
  // Chart 3: By contractor
  if(contractorNames.length>0)await drawChart('bar',contractorCounts,contractorNames,contractorNames.map((_,i)=>`hsl(${170+i*25},50%,55%)`),14,115,90,70,'By Contractor');
  // Chart 4: By area
  if(areaNames.length>0)await drawChart('bar',areaCounts,areaNames,areaNames.map((_,i)=>`hsl(${195+i*20},45%,55%)`),110,115,85,70,'By Area');

  // Summary table
  doc.setFillColor(...LG);doc.rect(14,195,W-28,8,'F');
  doc.setTextColor(...DG);doc.setFontSize(8);doc.setFont('helvetica','bold');
  ['Status','Count','%'].forEach((h,i)=>doc.text(h,[14,80,160][i],200));
  const statRows=[['Open',open],['In Progress',inProg],['Rectified',rectified],['Closed',closed],['Disputed',disputed],['TOTAL',total]];
  statRows.forEach((r,i)=>{
    const y=208+i*8;
    if(i%2===0){doc.setFillColor(250,252,252);doc.rect(14,y-5,W-28,8,'F');}
    doc.setTextColor(...(r[0]==='TOTAL'?DG:GRAY));doc.setFont('helvetica',r[0]==='TOTAL'?'bold':'normal');doc.setFontSize(8);
    doc.text(r[0],14,y);doc.text(String(r[1]),80,y);doc.text(total>0?Math.round(r[1]/total*100)+'%':'—',160,y);
  });

  // ── PAGE 3+ — DEFECT REGISTER ───────────────────────────
  doc.addPage();
  doc.setFillColor(...DG);doc.rect(0,0,W,18,'F');
  doc.setFillColor(...MG);doc.rect(0,0,8,18,'F');
  doc.setTextColor(255,255,255);doc.setFontSize(10);doc.setFont('helvetica','bold');doc.text('DEFECT REGISTER',14,12);

  const tableData=defects.map(d=>[
    d.seqId,
    d.area==='__other__'?(d.areaCustom||'Other'):d.area||'—',
    d.contractor||'—',
    doc.splitTextToSize(d.description,58)[0]+(d.description.length>60?'…':''),
    d.severity,
    d.status,
    fmtDate(d.dueDate)
  ]);

  doc.autoTable({
    startY:24,
    head:[['ID','Area','Contractor','Description','Severity','Status','Due']],
    body:tableData,
    theme:'grid',
    headStyles:{fillColor:DG,textColor:[255,255,255],fontSize:8,fontStyle:'bold',cellPadding:3},
    bodyStyles:{fontSize:7.5,cellPadding:2.5,textColor:[50,50,50]},
    alternateRowStyles:{fillColor:[248,252,252]},
    columnStyles:{0:{cellWidth:14,fontStyle:'bold'},1:{cellWidth:28},2:{cellWidth:28},3:{cellWidth:58},4:{cellWidth:16},5:{cellWidth:20},6:{cellWidth:16}},
    margin:{left:14,right:14},
    didParseCell:data=>{
      if(data.section==='body'&&data.column.index===4){const s=data.cell.raw;if(s==='Critical')data.cell.styles.textColor=[123,0,0];else if(s==='Major')data.cell.styles.textColor=[123,53,0];}
      if(data.section==='body'&&data.column.index===5){const s=data.cell.raw;if(s==='Open')data.cell.styles.textColor=[123,0,0];else if(s==='Closed')data.cell.styles.textColor=[21,87,36];else if(s==='Rectified')data.cell.styles.textColor=[91,33,182];}
    },
    didDrawPage:data=>{
      doc.setFillColor(...DG);doc.rect(0,H-12,W,12,'F');
      doc.setTextColor(...MG);doc.setFontSize(7);
      doc.text(proj.name+' · Defect Report · '+new Date().toLocaleDateString('en-AU'),W/2,H-5,{align:'center'});
    }
  });

  doc.save(`${proj.name.replace(/[^a-z0-9]/gi,'_')}_DefectReport_${new Date().toISOString().slice(0,10)}.pdf`);
}

  const unsubDef=useRef(null);
  const unsubClients=useRef(null);

  const showToast=msg=>{setToast(msg);clearTimeout(toastTimer.current);toastTimer.current=setTimeout(()=>setToast(null),3000);};

  useEffect(()=>{

  },[]);

  useEffect(()=>{

        const doc=await db.collection('users').doc(user.uid).get();

        else{const all=await db.collection('users').get();if(all.empty){const profile={name:user.email.split('@')[0],email:user.email,role:'admin',clientId:null,contractorName:null,createdAt:new Date().toISOString()};await db.collection('users').doc(user.uid).set(profile);setUserProfile({id:user.uid,...profile});}else{await auth.signOut();setAuthUser(null);setLoginErr('Account not found. Contact your administrator.');}}
      }else{setUserProfile(null);}
    });
    return()=>unsub();
  },[]);

  useEffect(()=>{
    if(!userProfile)return;
    unsubClients.current=db.collection('clients').orderBy('name','asc').onSnapshot(snap=>{setClients(snap.docs.map(d=>({id:d.id,...d.data()})));});
    return()=>unsubClients.current&&unsubClients.current();
  },[userProfile&&userProfile.id]);

  useEffect(()=>{
    if(!userProfile)return;
    if(unsubProj.current)unsubProj.current();
    let q=db.collection('projects').orderBy('createdAt','asc');
    if(userProfile.role==='client'&&userProfile.clientId)q=db.collection('projects').where('clientId','==',userProfile.clientId).orderBy('createdAt','asc');

    return()=>unsubProj.current&&unsubProj.current();
  },[userProfile&&userProfile.id]);
