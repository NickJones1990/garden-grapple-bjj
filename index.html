<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Garden Grapple — Position Map</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><circle cx='16' cy='16' r='14' fill='%231a3a3a'/><text x='16' y='22' text-anchor='middle' font-size='18' fill='%238B9E7E'>🪷</text></svg>">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#f7f6f3;--bg2:#eeeee9;--bg3:#fff;--text:#1a1a1a;--text2:#555;--text3:#999;--border:#ddd;--brand1:#1a3a3a;--brand2:#2d5252;--brand3:#8B9E7E;--brand4:#e8ede4;--red:#C4454A;--radius:10px;--radius-sm:6px;--star:#BA7517}
@media(prefers-color-scheme:dark){:root{--bg:#1a1a1a;--bg2:#252525;--bg3:#2a2a2a;--text:#e5e5e5;--text2:#aaa;--text3:#666;--border:#333}}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);max-width:820px;margin:0 auto;padding:12px;line-height:1.5;-webkit-font-smoothing:antialiased}
button{font-family:inherit;cursor:pointer;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-sm);padding:4px 10px;font-size:12px;color:var(--text2);transition:all .15s}
button:hover{border-color:#aaa;color:var(--text)}button:active{transform:scale(.97)}
input,select{font-family:inherit;font-size:14px;padding:8px 10px;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--bg3);color:var(--text);width:100%}
input:focus,select:focus{outline:none;border-color:var(--brand3)}select{width:auto}
.login-wrap{display:flex;align-items:center;justify-content:center;min-height:80vh}
.login-box{width:100%;max-width:360px;text-align:center}
.login-box h2{font-size:16px;font-weight:500;margin:16px 0 12px;color:var(--text)}
.login-box .sub{font-size:12px;color:var(--text3);margin-bottom:16px}
.user-list{display:flex;flex-direction:column;gap:6px;margin-bottom:16px}
.user-btn{padding:12px 16px;text-align:left;font-size:14px;font-weight:500;border-radius:var(--radius);border:1px solid var(--border);background:var(--bg3);cursor:pointer;display:flex;align-items:center;gap:10px}
.user-btn:hover{border-color:var(--brand3)}
.user-avatar{width:36px;height:36px;border-radius:50%;background:var(--brand1);color:var(--brand3);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:500;flex-shrink:0}
.user-info{flex:1}.user-info .name{color:var(--text)}.user-info .meta{font-size:11px;color:var(--text3);font-weight:400}
.pin-input{display:flex;gap:8px;justify-content:center;margin:12px 0}
.pin-digit{width:48px;height:56px;text-align:center;font-size:24px;font-weight:500;letter-spacing:2px;border-radius:var(--radius);border:2px solid var(--border);background:var(--bg3)}
.pin-digit:focus{border-color:var(--brand3)}
.pin-error{color:var(--red);font-size:12px;margin-top:4px}
.header{display:flex;align-items:center;gap:12px;padding:14px 16px;background:linear-gradient(135deg,#1a3a3a,#2d5252);border-radius:var(--radius);margin-bottom:12px;flex-wrap:wrap}
.header svg{flex-shrink:0}.header-text{flex:1;min-width:120px}
.header h1{font-size:17px;font-weight:600;color:#e8ede4;letter-spacing:.08em;line-height:1.2}
.header .sub{font-size:10px;color:#8B9E7E;letter-spacing:.12em;margin-top:2px}
.header-right{display:flex;align-items:center;gap:8px}
.ctx-btns{display:flex;gap:4px}
.ctx-btn{border:none;padding:5px 12px;border-radius:var(--radius-sm);font-size:11px;font-weight:500;background:rgba(255,255,255,.06);color:#8B9E7E;cursor:pointer}
.ctx-btn.active-all{background:rgba(255,255,255,.15);color:#e8ede4}
.ctx-btn.active-gi{background:#8B9E7E;color:#1a3a3a}
.ctx-btn.active-nogi{background:#5a8a8a;color:#1a3a3a}
.user-pill{border:none;padding:4px 10px;border-radius:var(--radius-sm);font-size:11px;background:rgba(255,255,255,.1);color:#8B9E7E;cursor:pointer;display:flex;align-items:center;gap:4px}
.toolbar{display:flex;align-items:center;gap:6px;margin-bottom:10px;flex-wrap:wrap}
.breadcrumb{font-size:12px;color:var(--text3);display:flex;align-items:center;gap:4px}
.breadcrumb span.link{color:var(--text2);cursor:pointer}.breadcrumb span.link:hover{color:var(--text)}
.breadcrumb span.current{color:var(--text);font-weight:500}
.spacer{flex:1}.saving{font-size:11px;color:var(--text3)}
.group-card{text-align:left;padding:14px 16px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);cursor:pointer;width:100%;margin-bottom:8px;border-left:4px solid #888}
.group-card h3{font-weight:500;font-size:15px;margin-bottom:2px}.group-card .meta{font-size:12px;color:var(--text3)}
.pos-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:8px;margin-bottom:12px}
.pos-card{text-align:left;padding:12px 14px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);cursor:pointer;border-left:3px solid #888}
.pos-card h4{font-weight:500;font-size:14px;margin-bottom:4px}.pos-card .meta{font-size:12px;color:var(--text3)}
.pos-card .tags{display:flex;gap:4px;margin-top:6px;flex-wrap:wrap}
.tag{font-size:10px;padding:1px 6px;border-radius:var(--radius-sm)}
.cat-section{margin-bottom:20px}
.cat-header{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.cat-icon{width:22px;height:22px;border-radius:var(--radius-sm);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:500}
.cat-title{font-size:14px;font-weight:500}.cat-count{font-size:12px;color:var(--text3)}
.item{display:flex;align-items:flex-start;gap:8px;padding:8px 12px;border-radius:var(--radius-sm);border:1px solid var(--border);border-left:3px solid #888;background:var(--bg3);margin-bottom:4px}
.item-body{flex:1;min-width:0}
.item-row{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.item-name{font-weight:500;font-size:14px}.item-notes{font-size:13px;color:var(--text2);margin-top:2px}
.item-actions{display:flex;gap:4px;flex-shrink:0;align-items:center}
.star-btn{border:none;background:none;font-size:18px;padding:0 2px;cursor:pointer;line-height:1;color:var(--text3);transition:color .15s}
.star-btn.active{color:var(--star)}
.priority-tag,.ctx-tag,.dest-tag,.dest-finish{font-size:10px;padding:1px 6px;border-radius:var(--radius-sm);font-weight:500}
.dest-tag{cursor:pointer}
.filter-bar{display:flex;gap:4px;margin-bottom:12px;align-items:center;flex-wrap:wrap}
.filter-btn{font-size:12px;opacity:.5}.filter-btn.active{opacity:1;font-weight:500}
.mygame-btn{font-size:12px;padding:3px 10px;border-radius:var(--radius-sm)}
.mygame-btn.active{background:var(--brand1);color:var(--brand4);border-color:var(--brand1)}
.form-box{padding:12px;border-radius:var(--radius-sm);background:var(--bg2);margin-top:8px}
.form-row{display:flex;gap:8px;margin-bottom:8px;flex-wrap:wrap}
.form-actions{display:flex;gap:6px}
.empty{font-size:13px;color:var(--text3);padding:4px 0;font-style:italic}
.del-btn{color:var(--red);border-color:transparent;background:transparent}.del-btn:hover{color:#a00}
.add-cats{margin-top:8px;font-size:12px;color:var(--text3)}
.admin-bar{background:var(--bg2);padding:6px 12px;border-radius:var(--radius-sm);margin-bottom:10px;font-size:12px;display:flex;align-items:center;gap:8px;color:var(--text2)}
.admin-bar .badge{background:var(--brand1);color:var(--brand4);padding:2px 8px;border-radius:var(--radius-sm);font-size:10px;font-weight:500}
@media(max-width:500px){.header{padding:12px}.header h1{font-size:15px}.pos-grid{grid-template-columns:1fr}.pin-digit{width:42px;height:48px;font-size:20px}}
</style>
</head>

<script>
const DEFAULT_DATA={"groups":[{"id":"standing","name":"Standing","color":"#B4B2A9","positions":[{"id":"standing-neutral","name":"Standing (neutral)","actions":{"takedowns":[{"name":"Double leg","notes":"Level change, penetration step, drive through","priority":1,"leadsTo":"top-side-control","ctx":"both"},{"name":"Single leg","notes":"Outside step, head inside, run the pipe","priority":1,"leadsTo":"top-half-guard","ctx":"both"},{"name":"Arm drag → back take","notes":"2-on-1, drag past, seatbelt","priority":1,"leadsTo":"back-attacking","ctx":"both"},{"name":"Collar drag","notes":"Snap and circle behind using collar grip","priority":2,"leadsTo":"back-attacking","ctx":"gi"},{"name":"Foot sweep","notes":"Timing-based off-balance, deashi barai","priority":3,"leadsTo":"top-side-control","ctx":"both"},{"name":"Body lock takedown","notes":"Clinch, outside trip or lift","priority":2,"leadsTo":"top-side-control","ctx":"both"}],"submissions":[{"name":"Standing guillotine","notes":"Snap down, lock chin, sit to guard","priority":2,"leadsTo":"finish","ctx":"both"}],"transitions":[{"name":"Pull closed guard","notes":"Collar + sleeve, sit and close","priority":2,"leadsTo":"bottom-closed-guard","ctx":"gi"},{"name":"Pull closed guard","notes":"2-on-1 or bodylock, sit and close","priority":2,"leadsTo":"bottom-closed-guard","ctx":"nogi"},{"name":"Sit to butterfly","notes":"Underhook, sit to butterfly hooks","priority":2,"leadsTo":"bottom-butterfly","ctx":"both"},{"name":"Imanari roll","notes":"Duck under, roll into ashi on lead leg","priority":3,"leadsTo":"bottom-ashi-garami","ctx":"nogi"},{"name":"Sprawl → front headlock","notes":"Defend shot, snap down","priority":1,"leadsTo":"top-front-headlock","ctx":"both"}],"risks":[{"name":"Takedown","notes":"They shoot — sprawl, crossface, circle","priority":1,"leadsTo":"bottom-side-control","ctx":"both"},{"name":"Snap down","notes":"Front headlock — posture up immediately","priority":2,"leadsTo":"bottom-turtle","ctx":"both"},{"name":"Throw","notes":"Judo — don't overcommit on grips","priority":2,"leadsTo":"bottom-side-control","ctx":"gi"},{"name":"Imanari roll","notes":"They roll into your legs — sprawl or step back","priority":2,"leadsTo":"bottom-ashi-garami","ctx":"nogi"}]}}]},{"id":"top","name":"Top position","color":"#7F77DD","positions":[{"id":"top-closed-guard","name":"Closed guard (top)","actions":{"passes":[{"name":"Stand up pass","notes":"Grip control, stand, break guard, toreando or knee cut","priority":1,"leadsTo":"top-side-control","ctx":"both"},{"name":"Log splitter","notes":"Hands in collar, knee in tailbone, split legs","priority":2,"leadsTo":"top-half-guard","ctx":"gi"},{"name":"Double under pass","notes":"Stack, walk around — heavy on hips","priority":2,"leadsTo":"top-side-control","ctx":"both"},{"name":"Knee in the middle","notes":"Posture up, wedge knee, break open","priority":1,"leadsTo":"top-open-guard","ctx":"both"}],"submissions":[{"name":"Ezekiel choke","notes":"Sleeve grip, fist to throat from inside guard","priority":3,"leadsTo":"finish","ctx":"gi"}],"transitions":[],"risks":[{"name":"Triangle","notes":"Break posture and angle — elbows in, posture up","priority":1,"leadsTo":"finish","ctx":"both"},{"name":"Armbar","notes":"High guard, hip escape — don't reach with one hand","priority":1,"leadsTo":"finish","ctx":"both"},{"name":"Kimura","notes":"Overhook trap — pull elbow back","priority":2,"leadsTo":"finish","ctx":"both"},{"name":"Hip bump sweep","notes":"They sit up explosive — base out wide","priority":1,"leadsTo":"bottom-mount","ctx":"both"},{"name":"Guillotine","notes":"Head too low — posture immediately","priority":2,"leadsTo":"finish","ctx":"both"}]}},{"id":"top-open-guard","name":"Open guard (top)","actions":{"passes":[{"name":"Toreando","notes":"Control ankles/pants, bull rush past","priority":1,"leadsTo":"top-side-control","ctx":"both"},{"name":"Knee cut","notes":"Underhook + cross grip, slice knee through","priority":1,"leadsTo":"top-side-control","ctx":"both"},{"name":"Leg drag","notes":"Pin legs to one side, walk past","priority":1,"leadsTo":"top-side-control","ctx":"both"},{"name":"Over-under pass","notes":"One arm under leg, one over, smash","priority":2,"leadsTo":"top-side-control","ctx":"both"},{"name":"X-pass","notes":"Step around outside of knee line","priority":2,"leadsTo":"top-side-control","ctx":"both"},{"name":"Long step pass","notes":"Off failed knee cut — step far leg back","priority":2,"leadsTo":"top-side-control","ctx":"both"}],"submissions":[],"transitions":[{"name":"Smash to half guard","notes":"Pressure into half, work from there","priority":2,"leadsTo":"top-half-guard","ctx":"both"},{"name":"Backstep to outside ashi","notes":"Step back over guard into outside ashi","priority":2,"leadsTo":"bottom-outside-ashi","ctx":"nogi"}],"risks":[{"name":"Collar-sleeve sweep","notes":"Push-pull — kill grips early","priority":1,"leadsTo":"bottom-open-guard","ctx":"gi"},{"name":"DLR hook","notes":"They hook lead leg — strip or backstep","priority":1,"leadsTo":"top-dlr","ctx":"both"},{"name":"Berimbolo","notes":"Inverted from DLR — don't let them invert","priority":2,"leadsTo":"bottom-turtle","ctx":"both"},{"name":"Leg lock entry","notes":"They pull into ashi — boot immediately","priority":2,"leadsTo":"bottom-ashi-garami","ctx":"nogi"}]}},{"id":"top-half-guard","name":"Half guard (top)","actions":{"passes":[{"name":"Knee cut pass","notes":"Crossface + underhook, knee across thigh","priority":1,"leadsTo":"top-side-control","ctx":"both"},{"name":"Smash pass","notes":"Flatten, crossface, hip switch, slide through","priority":1,"leadsTo":"top-side-control","ctx":"both"},{"name":"Backstep pass","notes":"Step over to leg drag position","priority":2,"leadsTo":"top-side-control","ctx":"both"},{"name":"Mount transition","notes":"Free leg, slide directly to mount","priority":2,"leadsTo":"top-mount","ctx":"both"}],"submissions":[{"name":"D'arce choke","notes":"When they go to side for underhook","priority":2,"leadsTo":"finish","ctx":"both"},{"name":"Kimura","notes":"When they reach for underhook — 2-on-1","priority":2,"leadsTo":"finish","ctx":"both"},{"name":"Kneebar","notes":"From backstep — belly-down on trapped leg","priority":2,"leadsTo":"finish","ctx":"both"}],"transitions":[],"risks":[{"name":"Underhook sweep","notes":"Deep underhook — crossface hard, whizzer","priority":1,"leadsTo":"bottom-half-guard","ctx":"both"},{"name":"Lockdown","notes":"They trap your leg — posture up, strip","priority":2,"leadsTo":"bottom-half-guard","ctx":"both"},{"name":"Back take","notes":"Dogfight circle behind — keep hip control","priority":2,"leadsTo":"bottom-turtle","ctx":"both"},{"name":"Leg lock entry","notes":"They catch leg during backstep — boot free","priority":2,"leadsTo":"bottom-ashi-garami","ctx":"nogi"}]}},{"id":"top-side-control","name":"Side control (top)","actions":{"submissions":[{"name":"Americana","notes":"Paint arm to mat, figure-4","priority":1,"leadsTo":"finish","ctx":"both"},{"name":"Kimura","notes":"North-south or when they reach across","priority":1,"leadsTo":"finish","ctx":"both"},{"name":"Arm triangle","notes":"Walk around head, squeeze","priority":2,"leadsTo":"finish","ctx":"both"},{"name":"Paper cutter","notes":"Deep lapel grip across throat","priority":2,"leadsTo":"finish","ctx":"gi"},{"name":"Baseball bat choke","notes":"Set grips, spin to NS or mount","priority":3,"leadsTo":"finish","ctx":"gi"}],"transitions":[{"name":"Mount","notes":"Knee slide or step over — control hip","priority":1,"leadsTo":"top-mount","ctx":"both"},{"name":"Knee on belly","notes":"Step knee across — creates reactions","priority":1,"leadsTo":"top-kob","ctx":"both"},{"name":"North-south","notes":"Walk around head — heavy pressure","priority":2,"leadsTo":"top-north-south","ctx":"both"},{"name":"Back take","notes":"When they turn away — gift wrap or underhook","priority":1,"leadsTo":"back-attacking","ctx":"both"}],"passes":[],"risks":[{"name":"Guard recovery","notes":"Frame and shrimp — heavy hips, kill frames","priority":1,"leadsTo":"top-closed-guard","ctx":"both"},{"name":"Underhook escape","notes":"Nearside underhook — whizzer, re-crossface","priority":2,"leadsTo":"standing-neutral","ctx":"both"}]}},{"id":"top-mount","name":"Mount (top)","actions":{"submissions":[{"name":"Armbar","notes":"S-mount, lean forward to bait, pivot","priority":1,"leadsTo":"finish","ctx":"both"},{"name":"Cross collar choke","notes":"Deep grips, patience","priority":1,"leadsTo":"finish","ctx":"gi"},{"name":"Americana","notes":"Low mount, paint arm","priority":2,"leadsTo":"finish","ctx":"both"},{"name":"Mounted triangle","notes":"From S-mount — step over head","priority":2,"leadsTo":"finish","ctx":"both"},{"name":"Arm triangle","notes":"Force head-arm config, dismount to side","priority":2,"leadsTo":"finish","ctx":"both"},{"name":"Ezekiel","notes":"Sleeve grip, fist to throat","priority":3,"leadsTo":"finish","ctx":"gi"}],"transitions":[{"name":"S-mount","notes":"Climb high for armbar/triangle entries","priority":1,"leadsTo":"top-mount","ctx":"both"},{"name":"Back take","notes":"When they turn — seatbelt, hooks","priority":1,"leadsTo":"back-attacking","ctx":"both"}],"passes":[],"risks":[{"name":"Upa/bridge","notes":"Trap arm + foot, bridge — grapevine, post","priority":1,"leadsTo":"bottom-closed-guard","ctx":"both"},{"name":"Elbow-knee escape","notes":"Shrimp to half guard — stay heavy","priority":1,"leadsTo":"top-half-guard","ctx":"both"}]}},{"id":"top-kob","name":"Knee on belly (top)","actions":{"submissions":[{"name":"Baseball bat choke","notes":"Set grips from KOB, spin","priority":1,"leadsTo":"finish","ctx":"gi"},{"name":"Armbar","notes":"When they push knee — step over arm","priority":1,"leadsTo":"finish","ctx":"both"}],"transitions":[{"name":"Mount","notes":"Step over when they turn in","priority":1,"leadsTo":"top-mount","ctx":"both"},{"name":"Back take","notes":"When they turn away","priority":1,"leadsTo":"back-attacking","ctx":"both"},{"name":"Side control","notes":"If losing balance, drop back","priority":2,"leadsTo":"top-side-control","ctx":"both"}],"passes":[],"risks":[{"name":"Push and re-guard","notes":"Frame knee — re-establish","priority":1,"leadsTo":"top-open-guard","ctx":"both"}]}},{"id":"top-north-south","name":"North-south (top)","actions":{"submissions":[{"name":"North-south choke","notes":"Arm under, sprawl hips, squeeze","priority":1,"leadsTo":"finish","ctx":"both"},{"name":"Kimura","notes":"Isolate far arm, step over head","priority":1,"leadsTo":"finish","ctx":"both"}],"transitions":[{"name":"Side control","notes":"Walk back to side","priority":1,"leadsTo":"top-side-control","ctx":"both"},{"name":"Mount","notes":"Spin to mount from NS","priority":2,"leadsTo":"top-mount","ctx":"both"}],"passes":[],"risks":[{"name":"Turtle escape","notes":"They turn to knees — take back","priority":1,"leadsTo":"top-turtle","ctx":"both"}]}},{"id":"top-front-headlock","name":"Front headlock (top)","actions":{"submissions":[{"name":"Guillotine","notes":"Arm-in or no-arm, sit back or sprawl","priority":1,"leadsTo":"finish","ctx":"both"},{"name":"D'arce","notes":"Arm across, lock figure-4, roll","priority":1,"leadsTo":"finish","ctx":"both"},{"name":"Anaconda","notes":"Opposite arm thread to D'arce","priority":2,"leadsTo":"finish","ctx":"both"}],"transitions":[{"name":"Snap to turtle","notes":"Keep head control, get behind","priority":1,"leadsTo":"top-turtle","ctx":"both"},{"name":"Go behind → back take","notes":"Spin behind from headlock","priority":1,"leadsTo":"back-attacking","ctx":"both"}],"passes":[],"risks":[{"name":"Sit-out","notes":"They peek and sit through","priority":1,"leadsTo":"standing-neutral","ctx":"both"},{"name":"Shot to single","notes":"They shoot from bottom — sprawl","priority":2,"leadsTo":"standing-neutral","ctx":"both"}]}},{"id":"top-turtle","name":"Turtle (top/attacking)","actions":{"submissions":[{"name":"Clock choke","notes":"Lapel grip, walk around head","priority":1,"leadsTo":"finish","ctx":"gi"},{"name":"Guillotine","notes":"Snap head const ADMIN_PIN_KEY="gg-admin-pin";
const MASTER_KEY="gg-master-v5";
const USERS_KEY="gg-users-v5";

const CATMETA={entries:{l:"Entries",i:"EN",c:"#639922",bg:"#EAF3DE",t:"#27500A"},takedowns:{l:"Takedowns",i:"TD",c:"#7F77DD",bg:"#EEEDFE",t:"#3C3489"},submissions:{l:"Submissions",i:"X",c:"#D85A30",bg:"#FAECE7",t:"#712B13"},sweeps:{l:"Sweeps",i:"SW",c:"#1D9E75",bg:"#E1F5EE",t:"#085041"},passes:{l:"Passes",i:"P",c:"#7F77DD",bg:"#EEEDFE",t:"#3C3489"},transitions:{l:"Transitions / escapes",i:"T",c:"#378ADD",bg:"#E6F1FB",t:"#0C447C"},risks:{l:"Risks / threats",i:"!",c:"#BA7517",bg:"#FAEEDA",t:"#633806"}};
const PRIO={1:"Go-to",2:"Secondary",3:"Situational"};
const CATS=["entries","takedowns","passes","submissions","sweeps","transitions","risks"];
const CTX_C={gi:{bg:"#EEEDFE",t:"#3C3489"},nogi:{bg:"#E6F1FB",t:"#0C447C"}};

let data,users,curUser=null,isAdmin=false;
let path=[],filterP=null,filterCtx="all",filterMyGame=false,editing=null,adding=null,addingPos=null;
let loginState="list",loginTarget=null,loginMode=null,pinError="";

function ls(k){try{return JSON.parse(localStorage.getItem(k))}catch{return null}}
function ss(k,v){try{localStorage.setItem(k,JSON.stringify(v))}catch{}}
function loadAll(){data=ls(MASTER_KEY)||JSON.parse(JSON.stringify(DEFAULT_DATA));users=ls(USERS_KEY)||[];const cu=ls(CUR_USER_KEY);if(cu){curUser=users.find(u=>u.name===cu)||null}if(!ls(ADMIN_PIN_KEY))ss(ADMIN_PIN_KEY,"0000")}
function saveMaster(){ss(MASTER_KEY,data)}
function saveUsers(){ss(USERS_KEY,users)}
function getUser(){return curUser}
function getUserGame(){return curUser?.myGame||{}}
function itemKey(posId,cat,idx){return posId+"|"+cat+"|"+idx}
function isMyGame(posId,cat,idx){return!!getUserGame()[itemKey(posId,cat,idx)]}
function toggleMyGame(posId,cat,idx){if(!curUser)return;const k=itemKey(posId,cat,idx);if(curUser.myGame[k])delete curUser.myGame[k];else curUser.myGame[k]=true;saveUsers();render()}
function posMap(){const m={};data.groups.forEach(g=>g.positions.forEach(p=>{m[p.id]=p.name}));return m}
function ctxMatch(item){return filterCtx==="all"||(item.ctx||"both")==="both"||(item.ctx||"both")===filterCtx}
function h(tag,props,...kids){const el=document.createElement(tag);if(props)Object.entries(props).forEach(([k,v])=>{if(k==="style"&&typeof v==="object")Object.assign(el.style,v);else if(k.startsWith("on"))el.addEventListener(k.slice(2).toLowerCase(),v);else if(k==="class")el.className=v;else el.setAttribute(k,v)});kids.flat(9).forEach(c=>{if(c!=null&&c!==false)el.append(typeof c==="string"||typeof c==="number"?document.createTextNode(c):c)});return el}
function initials(name){return name.split(/\s+/).map(w=>w[0]).join("").toUpperCase().slice(0,2)}

function render(){
const app=document.getElementById("app");app.innerHTML="";
if(!curUser){app.append(renderLogin());return}
const pm=posMap();
app.append(renderHeader());
if(isAdmin)app.append(renderAdminBar());
app.append(renderToolbar(pm));
if(path.length===0)app.append(renderGroups());
else if(path.length===1){const g=data.groups.find(x=>x.id===path[0]);if(g)app.append(renderPositions(g,pm))}
else if(path.length===2){const g=data.groups.find(x=>x.id===path[0]);const p=g?.positions.find(x=>x.id===path[1]);if(p)app.append(renderDetail(p,pm))}
}

  adminRow.append(h("button",{style:{flex:1,fontSize:"11px"},onClick:()=>fi.click()},"Import data"));
  adminRow.append(fi);
  box.append(adminRow);

} else if(loginState==="create"){
  box.append(h("h2",null,"Create your profile"));
  const nameI=h("input",{placeholder:"Your name",style:{marginBottom:"8px"}});

  box.append(h("div",{style:{fontSize:"12px",color:"var(--text3)",marginBottom:"8px"}},"Choose a 4-digit PIN"));

function makePinInputs(){
const wrap=h("div",{class:"pin-input"});
const inputs=[];let cb=null;
for(let i=0;i<4;i++){
  const inp=h("input",{class:"pin-digit",type:"tel",maxLength:"1",inputMode:"numeric",pattern:"[0-9]*"});
  inp.addEventListener("input",e=>{
    inp.value=inp.value.replace(/\D/g,"").slice(0,1);
    if(inp.value&&i<3)inputs[i+1].focus();
    const full=inputs.map(x=>x.value).join("");
    if(full.length===4&&cb)setTimeout(()=>cb(full),100);
  });
  inp.addEventListener("keydown",e=>{if(e.key==="Backspace"&&!inp.value&&i>0){inputs[i-1].focus();inputs[i-1].value=""}});
  inputs.push(inp);wrap.append(inp);
}
setTimeout(()=>inputs[0].focus(),50);
const obj={wrap,getValue:()=>inputs.map(x=>x.value).join("")};
Object.defineProperty(obj,"onComplete",{set:fn=>{cb=fn}});
return obj;
}

function renderGroups(){
const wrap=h("div",null);
data.groups.forEach(g=>{
  const total=g.positions.reduce((s,p)=>s+Object.values(p.actions).reduce((s2,arr)=>s2+arr.filter(ctxMatch).length,0),0);
  wrap.append(h("button",{class:"group-card",style:{borderLeftColor:g.color},onClick:()=>{path=[g.id];render()}},
    h("h3",null,g.name),h("div",{class:"meta"},g.positions.length+" positions · "+total+" techniques")));

function renderPositions(group,pm){
const wrap=h("div",null);
const grid=h("div",{class:"pos-grid"});
group.positions.forEach(p=>{
  const cats=CATS.filter(c=>p.actions[c]?.filter(ctxMatch).length>0);
  const total=cats.reduce((s,c)=>s+p.actions[c].filter(ctxMatch).length,0);
  const goTos=cats.reduce((s,c)=>s+p.actions[c].filter(x=>x.priority===1&&ctxMatch(x)).length,0);
  const myCount=curUser&&!isAdmin?cats.reduce((s,c)=>s+p.actions[c].filter((x,i)=>ctxMatch(x)&&isMyGame(p.id,c,p.actions[c].indexOf(x))).length,0):0;
  if(filterMyGame&&myCount===0)return;
  const card=h("button",{class:"pos-card",style:{borderLeftColor:group.color},onClick:()=>{path=[group.id,p.id];editing=null;adding=null;filterP=null;render()}},
    h("h4",null,p.name),
    h("div",{class:"meta"},total+" options"+(goTos?" · "+goTos+" go-to":"")+(myCount?" · ★"+myCount:"")),
    h("div",{class:"tags"},...cats.map(c=>{const m=CATMETA[c];return h("span",{class:"tag",style:{background:m.bg,color:m.t}},m.l+": "+p.actions[c].filter(ctxMatch).length)}))
  );
  grid.append(card);
});
wrap.append(grid);
if(isAdmin)wrap.append(h("button",{onClick:()=>{addingPos=group.id;render()}},"+ Add position"));
if(addingPos===group.id)wrap.append(renderAddPos(group.id));
return wrap;
}

fb.append(h("div",{class:"spacer"}));
if(isAdmin)fb.append(h("button",{class:"del-btn",onClick:()=>{if(confirm("Delete this position?")){for(const g of data.groups)g.positions=g.positions.filter(x=>x.id!==pos.id);saveMaster();path=path.slice(0,1);render()}}},"Delete position"));
wrap.append(fb);

const activeCats=CATS.filter(c=>(pos.actions[c]?.filter(ctxMatch).length>0)||c==="submissions"||c==="transitions"||c==="risks");
activeCats.forEach(cat=>{
  const m=CATMETA[cat];if(!m)return;
  const allItems=pos.actions[cat]||[];
  const items=allItems.filter(ctxMatch);
  let filtered=filterP?items.filter(i=>i.priority===filterP):items;
  if(filterMyGame)filtered=filtered.filter(item=>isMyGame(pos.id,cat,allItems.indexOf(item)));

  const sec=h("div",{class:"cat-section"});
  const hdr=h("div",{class:"cat-header"},
    h("div",{class:"cat-icon",style:{background:m.bg,color:m.t}},m.i),
    h("span",{class:"cat-title"},m.l),
    h("span",{class:"cat-count"},"("+filtered.length+")"),
    h("div",{class:"spacer"}),
    isAdmin?h("button",{onClick:()=>{adding=adding===cat?null:cat;editing=null;render()}},"+ Add"):null
  );
  sec.append(hdr);

  if(filtered.length===0){
    sec.append(h("div",{class:"empty"},filterMyGame?"No techniques in your game here":items.length?"None at this priority":allItems.length?"Hidden by ruleset filter":"None yet"));
  }

  filtered.forEach(item=>{
    const realIdx=allItems.indexOf(item);
    if(isAdmin&&editing&&editing.cat===cat&&editing.idx===realIdx){
      sec.append(renderItemForm(item,m,pm,(u)=>{Object.assign(allItems[realIdx],u);saveMaster();editing=null;render()},()=>{editing=null;render()}));
      return;
    }
    const dest=item.leadsTo;const destName=dest==="finish"?"Finish":(pm[dest]||dest);const ctx=item.ctx||"both";
    const starred=isMyGame(pos.id,cat,realIdx);
    const row=h("div",{class:"item",style:{borderLeftColor:m.c}},
      h("div",{class:"item-body"},
        h("div",{class:"item-row"},
          h("span",{class:"item-name"},item.name),
          h("span",{class:"priority-tag",style:{background:item.priority===1?m.bg:"var(--bg2)",color:item.priority===1?m.t:"var(--text3)"}},PRIO[item.priority]),
          ctx!=="both"?h("span",{class:"ctx-tag",style:{background:CTX_C[ctx].bg,color:CTX_C[ctx].t}},ctx==="gi"?"Gi":"No-gi"):null,
          dest&&dest!=="finish"?h("span",{class:"dest-tag",style:{color:m.t,background:m.bg},onClick:()=>{for(const g of data.groups){const p=g.positions.find(x=>x.id===dest);if(p){path=[g.id,dest];editing=null;adding=null;filterP=null;render();return}}}},"→ "+destName):null,
          dest==="finish"?h("span",{class:"dest-finish",style:{color:"#712B13",background:"#FAECE7"}},"→ Finish"):null
        ),
        item.notes?h("div",{class:"item-notes"},item.notes):null
      ),
      h("div",{class:"item-actions"},
        !isAdmin&&curUser?h("button",{class:"star-btn"+(starred?" active":""),onClick:()=>toggleMyGame(pos.id,cat,realIdx)},starred?"★":"☆"):null,
        isAdmin?h("button",{style:{fontSize:"11px",padding:"2px 6px"},onClick:()=>{editing={cat,idx:realIdx};adding=null;render()}},"Edit"):null,
        isAdmin?h("button",{class:"del-btn",style:{fontSize:"11px",padding:"2px 6px"},onClick:()=>{allItems.splice(realIdx,1);saveMaster();render()}},"×"):null
      )
    );
    sec.append(row);
  });

  if(isAdmin&&adding===cat)sec.append(renderItemForm(null,m,pm,(item)=>{if(!pos.actions[cat])pos.actions[cat]=[];pos.actions[cat].push(item);saveMaster();adding=null;render()},()=>{adding=null;render()},true));
  wrap.append(sec);
});

if(isAdmin){
  const inactiveCats=CATS.filter(c=>!activeCats.includes(c)&&CATMETA[c]);
  if(inactiveCats.length){
    const addC=h("div",{class:"add-cats"},h("span",null,"Add category: "));
    inactiveCats.forEach(c=>{addC.append(h("button",{onClick:()=>{adding=c;render()}},"+ "+CATMETA[c].l))});
    wrap.append(addC);
  }
}
return wrap;
}

function renderItemForm(item,meta,pm,onSave,onCancel,isNew){
const box=h("div",{class:"form-box",style:{borderColor:meta.c}});
const nameI=h("input",{value:item?.name||"",placeholder:"Technique name"});
const notesI=h("input",{value:item?.notes||"",placeholder:"Notes / cues"});
const prioS=h("select",null,h("option",{value:"1"},"Go-to"),h("option",{value:"2"},"Secondary"),h("option",{value:"3"},"Situational"));
prioS.value=String(item?.priority||2);prioS.style.width="110px";
const ctxS=h("select",null,h("option",{value:"both"},"Both"),h("option",{value:"gi"},"Gi only"),h("option",{value:"nogi"},"No-gi only"));
ctxS.value=item?.ctx||"both";ctxS.style.width="100px";
const destS=h("select",null,h("option",{value:""},"— none —"),h("option",{value:"finish"},"Finish (submission)"));
Object.entries(pm).sort((a,b)=>a[1].localeCompare(b[1])).forEach(([id,n])=>{destS.append(h("option",{value:id},n))});
destS.value=item?.leadsTo||"";destS.style.flex="1 1 160px";
box.append(h("div",{class:"form-row"},nameI,prioS,ctxS));
box.append(notesI);
box.append(h("div",{class:"form-row",style:{alignItems:"center"}},h("span",{style:{fontSize:"12px",color:"var(--text2)"}},"Leads to:"),destS));
box.append(h("div",{class:"form-actions"},
  h("button",{onClick:()=>{const n=nameI.value.trim();if(!n)return;onSave({name:n,notes:notesI.value.trim(),priority:+prioS.value,leadsTo:destS.value||undefined,ctx:ctxS.value})}},isNew?"Add":"Save"),
  h("button",{onClick:onCancel},"Cancel")
));
setTimeout(()=>nameI.focus(),0);
return box;
}

function renderAddPos(groupId){
const box=h("div",{class:"form-box"});
const nameI=h("input",{placeholder:"Position name"});
box.append(h("div",{style:{fontWeight:"500",fontSize:"14px",marginBottom:"12px"}},"New position"));
box.append(nameI);
box.append(h("div",{class:"form-actions",style:{marginTop:"8px"}},
  h("button",{onClick:()=>{const n=nameI.value.trim();if(!n)return;const g=data.groups.find(x=>x.id===groupId);if(g){const id=n.toLowerCase().replace(/[^a-z0-9]+/g,"-");g.positions.push({id,name:n,actions:{submissions:[],sweeps:[],transitions:[],risks:[]}});saveMaster();addingPos=null;path=[groupId,id];render()}}},
  "Add"),
  h("button",{onClick:()=>{addingPos=null;render()}},"Cancel")
));
setTimeout(()=>nameI.focus(),0);
return box;
}

loadAll();render();
-e 
</script>
